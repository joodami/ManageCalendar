<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ปฏิทินกิจกรรม - โรงเรียนพิมานพิทยาสรรค์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root {
            --bg-light: #f8fafc;
            --sarabun: 'Sarabun', sans-serif;
        }
        body { font-family: var(--sarabun); background-color: var(--bg-light); color: #1e293b; -webkit-font-smoothing: antialiased; }

        /* ปฏิทิน */
        .fc { background: #ffffff; border-radius: 2rem; padding: 1.5rem; border: none !important; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .fc-daygrid-day-number { font-weight: 600; color: #64748b; padding: 10px !important; }
        .fc-daygrid-day-frame { min-height: 90px !important; cursor: pointer; position: relative; }
        .fc-day-today { background: #f0f9ff !important; border: 1px solid #0ea5e9 !important; }

        /* Badge วงกลม */
        .event-count-container { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .event-count-badge {
            background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
            color: white; width: 38px; height: 38px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem; font-weight: 900; box-shadow: 0 8px 12px -3px rgba(2, 132, 199, 0.3);
        }

        /* ฟิลเตอร์ */
        .filter-item { display: flex; align-items: center; background: white; padding: 8px 16px; border-radius: 9999px; border: 2px solid #e2e8f0; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .filter-item:has(input:checked) { border-color: currentColor; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }

        /* โหมดรายการ (Mobile List) */
        #listView { display: none; }
        .list-card { background: white; border-radius: 1.5rem; padding: 1.5rem; border-left: 10px solid; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 1rem; }

        /* Modal */
        #dayModal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; border-radius: 2rem; max-width: 500px; width: 90%; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; }

        @media (max-width: 640px) {
            .fc-daygrid-day-frame { min-height: 70px !important; }
            .event-count-badge { width: 30px; height: 30px; font-size: 0.9rem; }
        }
        .fc-daygrid-event-harness { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="dayModal" onclick="if(event.target==this) closeModal()">
        <div class="modal-content animate-in zoom-in duration-200">
            <div class="p-5 border-b flex justify-between items-center">
                <h2 id="modalDate" class="font-bold text-lg text-slate-800"></h2>
                <button onclick="closeModal()" class="text-slate-400">✕</button>
            </div>
            <div id="dailyEventsContainer" class="p-5 overflow-y-auto space-y-4 bg-slate-50"></div>
            <div class="p-4"><button onclick="closeModal()" class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold">ปิด</button></div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 flex flex-col items-center gap-6">
            <div class="flex items-center gap-3">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Emblem_of_Thailand.svg/100px-Emblem_of_Thailand.svg.png" class="w-12 h-12 object-contain">
                <div class="text-left">
                    <h1 class="text-xl md:text-2xl font-black text-slate-900">ปฏิทินกิจกรรมโรงเรียน</h1>
                    <p class="text-indigo-600 text-sm font-bold">โรงเรียนพิมานพิทยาสรรค์</p>
                </div>
            </div>

            <div class="flex bg-slate-200 p-1 rounded-2xl w-full max-w-[300px]">
                <button onclick="switchView('calendar')" id="btnCal" class="flex-1 py-2 rounded-xl font-bold text-sm bg-white shadow-sm">ปฏิทิน</button>
                <button onclick="switchView('list')" id="btnList" class="flex-1 py-2 rounded-xl font-bold text-sm text-slate-500">รายการ</button>
            </div>

            <div class="flex flex-wrap gap-2 justify-center">
                <div class="filter-item border-slate-900 text-slate-900">
                    <input type="checkbox" id="filter-all" onchange="toggleAll(this)">
                    <label for="filter-all" class="ml-2 text-xs">ทั้งหมด</label>
                </div>
                <div class="filter-item border-[#6366f1] text-[#6366f1]">
                    <input type="checkbox" id="filter-director" class="dept-filter" onchange="handleFilterChange()">
                    <label for="filter-director" class="ml-2 text-xs">ผอ.</label>
                </div>
                <div class="filter-item border-[#0ea5e9] text-[#0ea5e9]">
                    <input type="checkbox" id="filter-school" class="dept-filter" onchange="handleFilterChange()">
                    <label for="filter-school" class="ml-2 text-xs">กิจกรรม</label>
                </div>
                <div class="filter-item border-[#10b981] text-[#10b981]">
                    <input type="checkbox" id="filter-vehicle" class="dept-filter" onchange="handleFilterChange()">
                    <label for="filter-vehicle" class="ml-2 text-xs">ยานพาหนะ</label>
                </div>
            </div>
        </header>

        <div id="instruction" class="text-center p-10 bg-white border-2 border-dashed rounded-3xl mb-8 text-slate-400 font-bold">
            👉 กรุณาเลือกหมวดหมู่ด้านบน
        </div>

        <div class="relative">
            <div id="loading" class="hidden absolute inset-0 bg-white/80 z-20 flex justify-center items-center rounded-3xl">
                <div class="w-10 h-10 border-4 border-t-indigo-600 rounded-full animate-spin"></div>
            </div>
            
            <div id="calendarView"><div id='calendar'></div></div>
            
            <div id="listView" class="space-y-4">
                <h3 class="font-black text-slate-800 mb-4">📅 รายการกิจกรรมที่กำลังจะมาถึง</h3>
                <div id="listContainer"></div>
            </div>
        </div>
    </div>

    <script>
        let calendar;
        let allEventsRaw = [];
        const gasUrl = 'https://script.google.com/macros/s/AKfycbxESHXBgm20xnXorOiDl-w3kFt6RZtU-iLUqBiJvmZKKgwyH6SraH5QrMDSj6dSuhRbpA/exec';

        document.addEventListener('DOMContentLoaded', function() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'th',
                height: 'auto',
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                dayCellDidMount: (info) => renderBadge(info.date, info.el),
                dateClick: (info) => showDailyEvents(info.dateStr)
            });
            calendar.render();
        });

        function switchView(mode) {
            const isCal = mode === 'calendar';
            document.getElementById('calendarView').style.display = isCal ? 'block' : 'none';
            document.getElementById('listView').style.display = isCal ? 'none' : 'block';
            document.getElementById('btnCal').className = isCal ? 'flex-1 py-2 rounded-xl font-bold text-sm bg-white shadow-sm' : 'flex-1 py-2 rounded-xl font-bold text-sm text-slate-500';
            document.getElementById('btnList').className = !isCal ? 'flex-1 py-2 rounded-xl font-bold text-sm bg-white shadow-sm' : 'flex-1 py-2 rounded-xl font-bold text-sm text-slate-500';
            if (!isCal) updateListView();
        }

        function toggleAll(source) {
            document.querySelectorAll('.dept-filter').forEach(f => f.checked = source.checked);
            handleFilterChange();
        }

        async function handleFilterChange() {
            const checkedFilters = document.querySelectorAll('.dept-filter:checked');
            document.getElementById('instruction').style.display = checkedFilters.length > 0 ? 'none' : 'block';
            
            if (checkedFilters.length > 0 && allEventsRaw.length === 0) {
                document.getElementById('loading').classList.remove('hidden');
                try {
                    const res = await fetch(gasUrl);
                    allEventsRaw = await res.json();
                } catch (e) { alert('โหลดข้อมูลไม่สำเร็จ'); }
                document.getElementById('loading').classList.add('hidden');
            }
            
            // --- จุดสำคัญ: บังคับให้ปฏิทินอัปเดต Badge ทันที ---
            calendar.view.calendar.dispatch({ type: 'SET_OPTION', optionName: 'dummy', optionValue: Date.now() });
            updateListView();
        }

        function filterData(events) {
            const showDir = document.getElementById('filter-director').checked;
            const showSch = document.getElementById('filter-school').checked;
            const showVeh = document.getElementById('filter-vehicle').checked;
            return events.filter(ev => {
                const gid = ev.extendedProps?.groupId;
                return (gid === 'director' && showDir) || (gid === 'school' && showSch) || (gid === 'vehicle' && showVeh);
            });
        }

        function renderBadge(date, cellEl) {
            const d = new Date(date);
            d.setHours(d.getHours() + 7);
            const dateStr = d.toISOString().split('T')[0];
            const events = filterData(allEventsRaw).filter(e => e.start.split('T')[0] === dateStr);
            
            const old = cellEl.querySelector('.event-count-container');
            if (old) old.remove();

            if (events.length > 0) {
                const container = document.createElement('div');
                container.className = 'event-count-container';
                container.innerHTML = `<div class="event-count-badge">${events.length}</div>`;
                cellEl.querySelector('.fc-daygrid-day-frame').appendChild(container);
            }
        }

        function updateListView() {
            const container = document.getElementById('listContainer');
            const events = filterData(allEventsRaw).filter(e => new Date(e.start) >= new Date().setHours(0,0,0,0));
            container.innerHTML = events.length === 0 ? '<p class="text-center py-10 text-slate-400">ไม่มีกิจกรรมที่กำลังจะมาถึง</p>' : '';
            
            events.slice(0, 20).forEach(ev => { // แสดง 20 รายการล่าสุดที่กำลังจะมาถึง
                const card = document.createElement('div');
                card.className = 'list-card';
                card.style.borderColor = ev.backgroundColor;
                const d = new Date(ev.start).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' });
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-black uppercase px-2 py-1 rounded-md text-white" style="background:${ev.backgroundColor}">${ev.extendedProps.dept}</span>
                        <span class="text-sm font-bold text-slate-400">${d}</span>
                    </div>
                    <div class="text-lg font-bold text-slate-800">${ev.title}</div>
                    <div class="text-sm text-slate-500 mt-2 line-clamp-2">${ev.extendedProps.description || ''}</div>
                    <button onclick="showDailyEvents('${ev.start.split('T')[0]}')" class="mt-3 text-sm font-bold text-indigo-600">ดูรายละเอียดเพิ่มเติม →</button>
                `;
                container.appendChild(card);
            });
        }

        function showDailyEvents(dateStr) {
            const events = filterData(allEventsRaw).filter(e => e.start.split('T')[0] === dateStr);
            const container = document.getElementById('dailyEventsContainer');
            document.getElementById('modalDate').innerText = new Date(dateStr).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
            container.innerHTML = '';
            events.forEach(ev => {
                const card = document.createElement('div');
                card.className = 'list-card mb-0 shadow-none bg-white border';
                card.style.borderColor = ev.backgroundColor;
                let desc = (ev.extendedProps.description || 'ไม่มีรายละเอียด').replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="block mt-3 p-3 bg-indigo-600 text-white text-center rounded-xl font-bold text-sm">📎 ดูไฟล์แนบ</a>');
                card.innerHTML = `<div class="text-xs font-black mb-1" style="color:${ev.backgroundColor}">${ev.extendedProps.dept}</div>
                                  <div class="font-bold text-slate-800">${ev.title}</div>
                                  <div class="text-sm text-slate-600 mt-2 whitespace-pre-line">${desc}</div>`;
                container.appendChild(card);
            });
            document.getElementById('dayModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('dayModal').style.display = 'none'; }
    </script>
</body>
</html>
