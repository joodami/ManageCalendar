<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบปฏิทินกิจกรรม - Phiman</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background: #f1f5f9; color: #1e293b; }
        .fc { background: white; border-radius: 1.5rem; padding: 1rem; border: none !important; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .fc-header-toolbar { margin-bottom: 1.5rem !important; flex-wrap: wrap; gap: 10px; }
        .fc-toolbar-title { font-size: 1.1rem !important; font-weight: 600; text-transform: capitalize; }
        .fc-daygrid-event-harness { display: none !important; } 
        .fc-daygrid-day-frame { cursor: pointer; transition: background 0.2s; min-height: 80px !important; }
        .fc-daygrid-day-frame:hover { background: #f8fafc; }
        .event-count-badge { display: inline-flex; align-items: center; justify-content: center; background: #6366f1; color: white; border-radius: 999px; padding: 2px 8px; font-size: 0.7rem; font-weight: 600; margin-top: 4px; box-shadow: 0 2px 4px rgba(99, 102, 241, 0.3); }
        .event-count-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 10px; }
        #dayModal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); z-index: 9999; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(8px); }
        .modal-content { background: white; border-radius: 2rem; max-width: 480px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
        .event-card { border-left: 6px solid; background: #f8fafc; padding: 16px; border-radius: 12px; margin-bottom: 12px; }
        .event-card-title { font-size: 1.1rem; font-weight: 600; color: #0f172a; margin: 4px 0; }
        .event-card-dept { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .filter-item { display: flex; align-items: center; background: white; padding: 8px 16px; border-radius: 9999px; border: 2px solid #e2e8f0; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
        @media (max-width: 640px) { .fc-daygrid-day-number { font-size: 0.85rem !important; } .fc-daygrid-day-frame { min-height: 65px !important; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="dayModal">
        <div class="modal-content">
            <div class="p-6 border-b flex justify-between items-center bg-white">
                <div>
                    <h2 id="modalDate" class="text-xl font-bold text-slate-900"></h2>
                    <p class="text-xs text-indigo-600 font-bold uppercase tracking-wider">รายการกิจกรรม</p>
                </div>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-full text-slate-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>
            </div>
            <div id="dailyEventsContainer" class="p-6 overflow-y-auto space-y-4 bg-slate-50/50"></div>
            <div class="p-4 border-t bg-white">
                <button onclick="closeModal()" class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold">ตกลง</button>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Emblem_of_Thailand.svg/100px-Emblem_of_Thailand.svg.png" 
                     alt="School Logo" class="w-12 h-12 object-contain">
                <div>
                    <h1 class="text-xl font-bold text-slate-900">ระบบปฏิทินโรงเรียน</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Phiman Phitthayasan School</p>
                </div>
            </div>

            <div class="flex flex-wrap gap-2 justify-center">
                <div class="filter-item border-[#8B5CF6] text-[#8B5CF6]">
                    <input type="checkbox" id="filter-director" onchange="handleFilterChange()" class="accent-[#8B5CF6]">
                    <label for="filter-director" class="ml-2">ผอ.</label>
                </div>
                <div class="filter-item border-[#0ea5e9] text-[#0ea5e9]">
                    <input type="checkbox" id="filter-school" onchange="handleFilterChange()" class="accent-[#0ea5e9]">
                    <label for="filter-school" class="ml-2">กิจกรรม</label>
                </div>
                <div class="filter-item border-[#10b981] text-[#10b981]">
                    <input type="checkbox" id="filter-vehicle" onchange="handleFilterChange()" class="accent-[#10b981]">
                    <label for="filter-vehicle" class="ml-2">ยานพาหนะ</label>
                </div>
            </div>
        </header>

        <div id="instruction" class="text-center py-4 px-6 bg-white rounded-2xl mb-8 font-bold text-indigo-400 border-2 border-dashed border-indigo-50 animate-pulse">
            📍 เลือกหมวดหมู่เพื่อดูข้อมูลย้อนหลังและล่วงหน้า
        </div>

        <div class="relative">
            <div id="loading" class="hidden absolute inset-0 bg-white/80 z-20 flex flex-col justify-center items-center rounded-3xl backdrop-blur-sm">
                <div class="w-10 h-10 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin mb-3"></div>
                <p class="text-sm font-bold text-slate-500">กำลังดาวน์โหลดข้อมูลปฏิทิน...</p>
            </div>
            <div id='calendar'></div>
        </div>
    </div>

    <script>
        let calendar;
        let allEventsRaw = [];
        const gasUrl = 'https://script.google.com/macros/s/AKfycbxESHXBgm20xnXorOiDl-w3kFt6RZtU-iLUqBiJvmZKKgwyH6SraH5QrMDSj6dSuhRbpA/exec';

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'th',
                height: 'auto',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: ''
                },
                buttonText: { today: 'วันนี้' },
                dayCellDidMount: function(info) {
                    updateDayCell(info.date, info.el);
                },
                dateClick: (info) => showDailyEvents(info.dateStr)
            });
            calendar.render();
        });

        function updateDayCell(date, cellEl) {
            const offset = date.getTimezoneOffset() * 60000;
            const localISOTime = new Date(date - offset).toISOString().split('T')[0];
            const events = filterData(allEventsRaw).filter(e => e.start.startsWith(localISOTime));
            
            const oldBadge = cellEl.querySelector('.event-count-container');
            if (oldBadge) oldBadge.remove();

            if (events.length > 0) {
                const container = document.createElement('div');
                container.className = 'event-count-container';
                container.innerHTML = `<span class="event-count-badge">${events.length} งาน</span>`;
                cellEl.querySelector('.fc-daygrid-day-frame').appendChild(container);
            }
        }

        async function handleFilterChange() {
            const checked = document.querySelectorAll('input[type="checkbox"]:checked').length > 0;
            document.getElementById('instruction').style.display = checked ? 'none' : 'block';
            
            if (checked && allEventsRaw.length === 0) {
                document.getElementById('loading').classList.remove('hidden');
                try {
                    const res = await fetch(gasUrl);
                    allEventsRaw = await res.json();
                } catch (e) { alert('ไม่สามารถดึงข้อมูลได้'); }
                document.getElementById('loading').classList.add('hidden');
            }
            calendar.render(); 
        }

        function filterData(events) {
            const showDir = document.getElementById('filter-director').checked;
            const showSch = document.getElementById('filter-school').checked;
            const showVeh = document.getElementById('filter-vehicle').checked;
            return events.filter(ev => {
                if (ev.extendedProps.groupId === 'director') return showDir;
                if (ev.extendedProps.groupId === 'school') return showSch;
                if (ev.extendedProps.groupId === 'vehicle') return showVeh;
                return false;
            });
        }

        function showDailyEvents(dateStr) {
            const events = filterData(allEventsRaw).filter(e => e.start.startsWith(dateStr));
            const container = document.getElementById('dailyEventsContainer');
            document.getElementById('modalDate').innerText = new Date(dateStr).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
            container.innerHTML = '';
            if (events.length === 0) {
                container.innerHTML = '<div class="text-center py-10 text-slate-400 text-sm">ไม่มีกิจกรรม</div>';
            } else {
                events.forEach(ev => {
                    const card = document.createElement('div');
                    card.className = 'event-card';
                    card.style.borderColor = ev.backgroundColor;
                    let desc = ev.extendedProps.description || 'ไม่มีรายละเอียด';
                    const urlRegex = /(https?:\/\/[^\s]+)/g;
                    desc = desc.replace(urlRegex, (url) => `<a href="${url}" target="_blank" class="block mt-2 p-2 bg-indigo-600 text-white rounded-lg text-xs font-bold text-center">เปิดเอกสารแนบ</a>`);
                    card.innerHTML = `<div class="event-card-dept" style="color:${ev.backgroundColor}">${ev.extendedProps.dept}</div><div class="event-card-title">${ev.title}</div><div class="text-[11px] text-slate-500 whitespace-pre-line">${desc}</div>`;
                    container.appendChild(card);
                });
            }
            document.getElementById('dayModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('dayModal').style.display = 'none'; }
    </script>
</body>
</html>
