<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบปฏิทินกิจกรรม - Phiman</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root {
            --primary-font: 'Prompt', sans-serif;
        }
        body { 
            font-family: var(--primary-font); 
            background: #f8fafc; 
            color: #0f172a; 
            -webkit-font-smoothing: antialiased;
        }

        /* ปรับแต่งปฏิทินให้ดู Premium */
        .fc { 
            background: white; 
            border-radius: 2rem; 
            padding: clamp(1rem, 3vw, 2rem); 
            border: none !important; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .fc-header-toolbar { margin-bottom: 2rem !important; }
        
        /* ขยายขนาดหัวข้อเดือน */
        .fc-toolbar-title { 
            font-size: clamp(1.4rem, 5vw, 2.2rem) !important; 
            font-weight: 700 !important; 
            color: #1e293b;
        }

        /* ปรับแต่งปุ่มควบคุมปฏิทิน */
        .fc-button {
            background: #f1f5f9 !important;
            border: none !important;
            color: #475569 !important;
            font-weight: 600 !important;
            padding: 10px 15px !important;
            border-radius: 12px !important;
            text-transform: capitalize !important;
        }
        .fc-button-active { background: #1e293b !important; color: white !important; }

        /* ปรับแต่งช่องวันที่ */
        .fc-daygrid-day-number { 
            font-size: clamp(1rem, 2vw, 1.3rem) !important; 
            padding: 12px !important; 
            font-weight: 600;
            color: #64748b;
        }
        .fc-daygrid-day-frame { cursor: pointer; min-height: 100px !important; transition: all 0.2s; }
        .fc-daygrid-day-frame:hover { background: #f1f5f9; }
        .fc-day-today { background: #eff6ff !important; }

        /* ป้ายแจ้งเตือนจำนวนงาน (Badge) */
        .event-count-badge {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: clamp(0.75rem, 1.5vw, 0.95rem);
            font-weight: 700;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
            animation: fadeIn 0.3s ease;
        }

        /* Modal: ปรับให้ใหญ่และอ่านง่ายขึ้น */
        #dayModal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.85); z-index: 9999; 
            align-items: center; justify-content: center; padding: 1.5rem; 
            backdrop-filter: blur(12px); 
        }
        .modal-content { 
            background: white; border-radius: 2.5rem; 
            max-width: 550px; width: 100%; max-height: 85vh; 
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* การ์ดกิจกรรมใน Modal */
        .event-card { 
            border-left: 8px solid; background: #f8fafc; 
            padding: 24px; border-radius: 1.5rem; margin-bottom: 1rem;
            transition: transform 0.2s;
        }
        .event-card-title { 
            font-size: clamp(1.1rem, 3vw, 1.4rem); 
            font-weight: 700; color: #0f172a; line-height: 1.4;
        }
        .event-card-dept { font-size: 0.85rem; font-weight: 800; letter-spacing: 0.1em; margin-bottom: 6px; }

        /* Filter Pills */
        .filter-item { 
            display: flex; align-items: center; background: white; 
            padding: clamp(10px, 2vw, 14px) clamp(20px, 3vw, 28px); 
            border-radius: 1.5rem; border: 2px solid #e2e8f0; 
            font-size: clamp(0.9rem, 2vw, 1.1rem); font-weight: 700; 
            cursor: pointer; transition: all 0.2s;
        }
        .filter-item:has(input:checked) { border-color: currentColor; background: rgba(0,0,0,0.02); }
        .filter-item input { width: 22px; height: 22px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* สำหรับมือถือที่หน้าจอเล็กมาก */
        @media (max-width: 640px) {
            .fc-daygrid-day-frame { min-height: 80px !important; }
            .fc-header-toolbar { flex-direction: column !important; align-items: center !important; }
            .event-count-badge { padding: 4px 10px; }
        }
    </style>
</head>
<body class="p-4 md:p-12 lg:p-16">

    <div id="dayModal" onclick="if(event.target==this) closeModal()">
        <div class="modal-content animate-in zoom-in duration-300">
            <div class="p-8 border-b flex justify-between items-start bg-white">
                <div>
                    <h2 id="modalDate" class="text-3xl font-extrabold text-slate-900 tracking-tight"></h2>
                    <p class="text-lg text-indigo-600 font-bold mt-1">📌 รายการกิจกรรมประจำวัน</p>
                </div>
                <button onclick="closeModal()" class="p-3 hover:bg-slate-100 rounded-full text-slate-400 transition-all">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>
            </div>
            <div id="dailyEventsContainer" class="p-8 overflow-y-auto space-y-6 bg-slate-50/50">
                </div>
            <div class="p-6 bg-white border-t">
                <button onclick="closeModal()" class="w-full py-5 bg-slate-900 text-white rounded-2xl text-xl font-bold shadow-xl active:scale-[0.98] transition-all">เข้าใจแล้ว</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="mb-12 flex flex-col lg:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-6">
                <div class="p-4 bg-white rounded-3xl shadow-sm border border-slate-100">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Emblem_of_Thailand.svg/100px-Emblem_of_Thailand.svg.png" 
                         alt="Logo" class="w-16 h-16 md:w-20 md:h-20 object-contain">
                </div>
                <div>
                    <h1 class="text-3xl md:text-5xl font-black text-slate-900 tracking-tighter">ปฏิทินกิจกรรมรวม</h1>
                    <p class="text-lg md:text-xl font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Phiman Phitthayasan</p>
                </div>
            </div>

            <div class="flex flex-wrap gap-3 justify-center">
                <div class="filter-item border-[#8B5CF6] text-[#8B5CF6]">
                    <input type="checkbox" id="filter-director" onchange="handleFilterChange()" class="accent-[#8B5CF6]">
                    <label for="filter-director" class="ml-3">งาน ผอ.</label>
                </div>
                <div class="filter-item border-[#0ea5e9] text-[#0ea5e9]">
                    <input type="checkbox" id="filter-school" onchange="handleFilterChange()" class="accent-[#0ea5e9]">
                    <label for="filter-school" class="ml-3">กิจกรรมโรงเรียน</label>
                </div>
                <div class="filter-item border-[#10b981] text-[#10b981]">
                    <input type="checkbox" id="filter-vehicle" onchange="handleFilterChange()" class="accent-[#10b981]">
                    <label for="filter-vehicle" class="ml-3">งานยานพาหนะ</label>
                </div>
            </div>
        </header>

        <div id="instruction" class="text-center py-8 px-10 bg-indigo-600 text-white rounded-[2.5rem] mb-12 shadow-2xl shadow-indigo-200">
            <p class="text-xl md:text-2xl font-black italic animate-pulse">👉 โปรดเลือกประเภทปฏิทินที่ต้องการดู 👈</p>
        </div>

        <div class="relative">
            <div id="loading" class="hidden absolute inset-0 bg-white/90 z-20 flex flex-col justify-center items-center rounded-[2rem] backdrop-blur-md">
                <div class="w-20 h-20 border-8 border-slate-100 border-t-indigo-600 rounded-full animate-spin mb-6"></div>
                <p class="text-2xl font-black text-slate-800">กำลังดึงข้อมูลกิจกรรม...</p>
            </div>
            <div id='calendar'></div>
        </div>
    </div>

    <script>
        let calendar;
        let allEventsRaw = [];
        const gasUrl = 'https://script.google.com/macros/s/AKfycbxESHXBgm20xnXorOiDl-w3kFt6RZtU-iLUqBiJvmZKKgwyH6SraH5QrMDSj6dSuhRbpA/exec';

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'th',
                height: 'auto',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: ''
                },
                buttonText: { today: 'วันนี้' },
                dayCellDidMount: function(info) {
                    updateDayCell(info.date, info.el);
                },
                dateClick: (info) => showDailyEvents(info.dateStr)
            });
            calendar.render();
        });

        function updateDayCell(date, cellEl) {
            const offset = date.getTimezoneOffset() * 60000;
            const localISOTime = new Date(date - offset).toISOString().split('T')[0];
            const events = filterData(allEventsRaw).filter(e => e.start.startsWith(localISOTime));
            
            const oldBadge = cellEl.querySelector('.event-count-container');
            if (oldBadge) oldBadge.remove();

            if (events.length > 0) {
                const container = document.createElement('div');
                container.className = 'event-count-container flex justify-center items-center mt-2';
                container.innerHTML = `<span class="event-count-badge">${events.length} รายการ</span>`;
                cellEl.querySelector('.fc-daygrid-day-frame').appendChild(container);
            }
        }

        async function handleFilterChange() {
            const checked = document.querySelectorAll('input[type="checkbox"]:checked').length > 0;
            document.getElementById('instruction').style.display = checked ? 'none' : 'block';
            
            if (checked && allEventsRaw.length === 0) {
                document.getElementById('loading').classList.remove('hidden');
                try {
                    const res = await fetch(gasUrl);
                    allEventsRaw = await res.json();
                } catch (e) { alert('ขออภัย! ไม่สามารถดึงข้อมูลได้ในขณะนี้'); }
                document.getElementById('loading').classList.add('hidden');
            }
            calendar.render(); 
        }

        function filterData(events) {
            const showDir = document.getElementById('filter-director').checked;
            const showSch = document.getElementById('filter-school').checked;
            const showVeh = document.getElementById('filter-vehicle').checked;
            return events.filter(ev => {
                if (ev.extendedProps.groupId === 'director') return showDir;
                if (ev.extendedProps.groupId === 'school') return showSch;
                if (ev.extendedProps.groupId === 'vehicle') return showVeh;
                return false;
            });
        }

        function showDailyEvents(dateStr) {
            const events = filterData(allEventsRaw).filter(e => e.start.startsWith(dateStr));
            const container = document.getElementById('dailyEventsContainer');
            document.getElementById('modalDate').innerText = new Date(dateStr).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
            container.innerHTML = '';
            
            if (events.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16">
                        <div class="text-6xl mb-4">🗓️</div>
                        <p class="text-xl text-slate-400 font-bold">ไม่มีกิจกรรมสำหรับวันนี้</p>
                    </div>`;
            } else {
                events.forEach(ev => {
                    const card = document.createElement('div');
                    card.className = 'event-card shadow-sm';
                    card.style.borderColor = ev.backgroundColor;
                    
                    let desc = ev.extendedProps.description || 'ไม่มีรายละเอียดเพิ่มเติม';
                    const urlRegex = /(https?:\/\/[^\s]+)/g;
                    desc = desc.replace(urlRegex, (url) => `
                        <a href="${url}" target="_blank" class="flex items-center justify-center gap-2 mt-4 p-4 bg-indigo-600 text-white rounded-xl text-sm font-bold shadow-lg hover:bg-indigo-700 transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                            คลิกเพื่อเปิดเอกสารแนบ
                        </a>`);

                    card.innerHTML = `
                        <div class="event-card-dept" style="color:${ev.backgroundColor}">${ev.extendedProps.dept}</div>
                        <div class="event-card-title">${ev.title}</div>
                        <div class="text-base text-slate-500 font-medium whitespace-pre-line mt-2">${desc}</div>
                    `;
                    container.appendChild(card);
                });
            }
            document.getElementById('dayModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('dayModal').style.display = 'none'; }
    </script>
</body>
</html>
