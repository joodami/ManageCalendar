<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบปฏิทินกิจกรรม - Phiman</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            background: #f8fafc; 
            min-height: 100vh; 
        }
        
        /* ปรับแต่งปฏิทิน */
        .fc { 
            background: white; 
            border-radius: 1.5rem; 
            padding: 1.25rem; 
            border: none !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .fc-header-toolbar { 
            margin-bottom: 1.5rem !important;
            gap: 10px;
        }
        .fc-event { 
            border-radius: 6px !important; 
            border: none !important; 
            padding: 2px 6px !important; 
            font-weight: 300;
        }
        .fc-toolbar-title { 
            font-size: 1.2rem !important; 
            font-weight: 600; 
            color: #1e293b;
        }

        /* ปรับแต่ง Checkbox ให้สวยและสดใส */
        .custom-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .filter-item {
            display: flex;
            align-items: center;
            background: white;
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .filter-item:hover {
            border-color: #cbd5e1;
            background: #f1f5f9;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .fc-header-toolbar { 
                display: flex !important;
                flex-direction: column !important; 
                align-items: center !important; 
            }
            .fc-toolbar-chunk { margin-bottom: 5px; }
            .fc-button { font-size: 0.85rem !important; }
            body { padding: 10px !important; }
            .filter-container { justify-content: start !important; overflow-x: auto; padding-bottom: 10px; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8">
            <div class="text-center md:text-left mb-6">
                <h1 class="text-3xl font-bold text-slate-800">ปฏิทินกิจกรรมรวม</h1>
                <p class="text-slate-500 text-lg">Phiman Phitthayasan School</p>
            </div>
            
            <div class="filter-container flex flex-wrap gap-4 justify-center md:justify-start">
                <div class="filter-item">
                    <input type="checkbox" id="filter-director" checked onchange="updateFilter()" 
                           class="custom-checkbox accent-[#8B5CF6]">
                    <label for="filter-director" class="ml-3 text-slate-700 cursor-pointer font-medium">
                        ตารางงานผู้อำนวยการ
                    </label>
                </div>
                <div class="filter-item">
                    <input type="checkbox" id="filter-school" checked onchange="updateFilter()" 
                           class="custom-checkbox accent-[#0EA5E9]">
                    <label for="filter-school" class="ml-3 text-slate-700 cursor-pointer font-medium">
                        กิจกรรมโรงเรียน
                    </label>
                </div>
                <div class="filter-item">
                    <input type="checkbox" id="filter-vehicle" checked onchange="updateFilter()" 
                           class="custom-checkbox accent-[#F43F5E]">
                    <label for="filter-vehicle" class="ml-3 text-slate-700 cursor-pointer font-medium">
                        งานยานพาหนะ
                    </label>
                </div>
            </div>
        </header>

        <div class="relative min-h-[500px]">
            <div id="loading" class="absolute inset-0 bg-white/80 z-10 flex flex-col justify-center items-center rounded-3xl">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mb-2"></div>
                <p class="text-indigo-600 font-semibold">กำลังโหลดข้อมูล...</p>
            </div>
            <div id='calendar'></div>
        </div>
    </div>

    <script>
        let calendar;
        let allEventsRaw = [];
        // ใช้ URL เดิมของคุณ
        const gasUrl = 'https://script.google.com/macros/s/AKfycbxESHXBgm20xnXorOiDl-w3kFt6RZtU-iLUqBiJvmZKKgwyH6SraH5QrMDSj6dSuhRbpA/exec';

        document.addEventListener('DOMContentLoaded', async function() {
            const calendarEl = document.getElementById('calendar');
            
            // ตรวจสอบขนาดจอเพื่อเลือกมุมมอง (มือถือเปิดมาเป็น List เลยจะดูง่ายกว่า)
            const isMobile = window.innerWidth < 768;

            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: isMobile ? 'listMonth' : 'dayGridMonth',
                locale: 'th',
                height: 'auto',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: isMobile ? 'listMonth,dayGridMonth' : 'dayGridMonth,timeGridWeek,listMonth'
                },
                buttonText: {
                    today: 'วันนี้',
                    month: 'เดือน',
                    week: 'สัปดาห์',
                    list: 'รายการ'
                },
                events: function(fetchInfo, successCallback, failureCallback) {
                    successCallback(filterEvents(allEventsRaw));
                },
                eventClick: function(info) {
                    alert('📌 ' + info.event.title + 
                          '\n🏢 ฝ่าย: ' + info.event.extendedProps.dept + 
                          (info.event.extendedProps.description ? '\n📝 รายละเอียด: ' + info.event.extendedProps.description : ''));
                }
            });

            try {
                const response = await fetch(gasUrl);
                allEventsRaw = await response.json();
                document.getElementById('loading').classList.add('hidden');
                calendar.render();
            } catch (error) {
                document.getElementById('loading').innerHTML = '<p class="text-red-500 font-bold">ไม่สามารถดึงข้อมูลได้</p>';
            }
        });

        function filterEvents(events) {
            const showDirector = document.getElementById('filter-director').checked;
            const showSchool = document.getElementById('filter-school').checked;
            const showVehicle = document.getElementById('filter-vehicle').checked;

            return events.filter(event => {
                if (event.extendedProps.groupId === 'director') return showDirector;
                if (event.extendedProps.groupId === 'school') return showSchool;
                if (event.extendedProps.groupId === 'vehicle') return showVehicle;
                return true;
            });
        }

        function updateFilter() {
            if (calendar) {
                calendar.refetchEvents();
            }
        }
    </script>
</body>
</html>
