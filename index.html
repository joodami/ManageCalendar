<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ปฏิทินกิจกรรม - โรงเรียนพิมานพิทยาสรรค์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root {
            --bg-light: #f8fafc; /* สีพื้นหลังอ่อนๆ โทนพาสเทล */
            --text-main: #1e293b; /* สีข้อความเทาเข้ม อ่านง่าย */
            --sarabun: 'Sarabun', sans-serif;
        }
        body { 
            font-family: var(--sarabun); 
            background-color: var(--bg-light);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* --- ปฏิทินหลัก (สีขาวโดดเด่น) --- */
        .fc { 
            background: #ffffff; 
            border-radius: 2rem; 
            padding: clamp(1rem, 3vw, 2rem); 
            border: none !important; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.03), 0 10px 10px -5px rgba(0, 0, 0, 0.01);
            color: #1e293b;
        }
        .fc-header-toolbar { margin-bottom: 2rem !important; gap: 10px; }
        .fc-toolbar-title { 
            font-size: clamp(1.4rem, 5vw, 2rem) !important; 
            font-weight: 700 !important; 
            color: #0f172a;
        }

        /* --- ปุ่มควบคุมปฏิทิน --- */
        .fc-button {
            background: #ffffff !important;
            border: 1px solid #e2e8f0 !important;
            color: #475569 !important;
            font-weight: 600 !important;
            padding: 10px 18px !important;
            border-radius: 14px !important;
            font-family: var(--sarabun);
        }
        .fc-button-active { background: #0f172a !important; color: white !important; border-color: #0f172a !important; }

        /* --- วันที่ในปฏิทิน --- */
        .fc-daygrid-day-number { 
            font-size: 1.15rem !important; 
            padding: 10px !important; 
            font-weight: 600;
            color: #64748b;
        }
        .fc-daygrid-day-frame { min-height: 90px !important; cursor: pointer; transition: 0.2s; }
        .fc-daygrid-day-frame:hover { background: #f1f5f9; }
        .fc-day-today { background: #f0f9ff !important; border: 1px solid #0ea5e9 !important; }

        /* --- ป้ายแจ้งเตือน (Badge) ตัวใหญ่ --- */
        .event-count-badge {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            display: inline-block;
        }

        /* --- Modal รายละเอียด --- */
        #dayModal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.7); z-index: 9999; 
            align-items: center; justify-content: center; padding: 1rem; 
            backdrop-filter: blur(8px); 
        }
        .modal-content { 
            background: #ffffff; border-radius: 2.5rem; 
            max-width: 580px; width: 100%; max-height: 88vh; 
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
        }
        
        /* --- การ์ดกิจกรรม --- */
        .event-card { 
            border-left: 8px solid; background: #f8fafc; 
            padding: 24px; border-radius: 1.5rem; margin-bottom: 1.25rem;
            border-top: 1px solid #e2e8f0;
            border-right: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
        }
        .event-card-title { 
            font-size: 1.4rem; 
            font-weight: 700; color: #0f172a; line-height: 1.3;
            margin-bottom: 6px;
        }
        .event-card-dept { font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
        .event-card-desc { font-size: 1.15rem; color: #334155; line-height: 1.6; font-weight: 400; }

        /* --- ฟิลเตอร์ (Pills) --- */
        .filter-item { 
            display: flex; align-items: center; background: white; 
            padding: 12px 22px; border-radius: 9999px; border: 2px solid #e2e8f0; 
            font-size: 1.05rem; font-weight: 600; color: #475569;
            cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
        }
        .filter-item:has(input:checked) { 
            border-color: currentColor; 
            background: #fff; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            color: #0f172a;
        }
        .filter-item input { width: 22px; height: 22px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Mobile Adjustments */
        @media (max-width: 640px) {
            .fc { border-radius: 1.5rem; padding: 0.75rem; }
            .fc-daygrid-day-frame { min-height: 75px !important; }
            .event-count-badge { font-size: 0.85rem; padding: 4px 12px; }
            .event-card-title { font-size: 1.2rem; }
            .event-card-desc { font-size: 1.1rem; }
            .filter-item { padding: 8px 16px; font-size: 0.9rem; }
            .fc-toolbar-title { font-size: 1.1rem !important; }
            .event-card { padding: 20px; border-radius: 1.25rem; }
        }

        .fc-daygrid-event-harness { display: none !important; } 
    </style>
</head>
<body class="p-4 md:p-12 lg:p-16">

    <div id="dayModal" onclick="if(event.target==this) closeModal()">
        <div class="modal-content animate-in zoom-in duration-300">
            <div class="p-8 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                <div>
                    <h2 id="modalDate" class="text-2xl font-bold text-slate-900 tracking-tight"></h2>
                    <p class="text-indigo-600 font-bold mt-1 text-base">📌 รายการกิจกรรมวันนี้</p>
                </div>
                <button onclick="closeModal()" class="p-3 bg-slate-100 rounded-xl text-slate-500 hover:bg-red-50 hover:text-red-500 transition-all">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>
            </div>
            <div id="dailyEventsContainer" class="p-6 md:p-10 overflow-y-auto space-y-6 bg-slate-50">
                </div>
            <div class="p-5 bg-white border-t">
                <button onclick="closeModal()" class="w-full py-4 bg-slate-900 text-white rounded-2xl text-lg font-bold shadow-lg active:scale-95 transition-all">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="mb-12 flex flex-col lg:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-6">
                <div class="p-3 bg-white rounded-3xl shadow-lg border border-slate-100">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Emblem_of_Thailand.svg/100px-Emblem_of_Thailand.svg.png" 
                         alt="School Logo" class="w-16 h-16 md:w-20 md:h-20 object-contain">
                </div>
                <div>
                    <h1 class="text-3xl md:text-5xl font-extrabold text-slate-950 tracking-tighter leading-none">ปฏิทินกิจกรรมรวม</h1>
                    <p class="text-lg md:text-xl font-bold text-indigo-500 mt-2">โรงเรียนพิมานพิทยาสรรค์</p>
                </div>
            </div>

            <div class="flex flex-wrap gap-2.5 justify-center">
                <div class="filter-item border-[#6366f1] text-[#6366f1]">
                    <input type="checkbox" id="filter-director" onchange="handleFilterChange()" class="accent-[#6366f1]">
                    <label for="filter-director" class="ml-3">ผอ.</label>
                </div>
                <div class="filter-item border-[#0ea5e9] text-[#0ea5e9]">
                    <input type="checkbox" id="filter-school" onchange="handleFilterChange()" class="accent-[#0ea5e9]">
                    <label for="filter-school" class="ml-3">กิจกรรม</label>
                </div>
                <div class="filter-item border-[#10b981] text-[#10b981]">
                    <input type="checkbox" id="filter-vehicle" onchange="handleFilterChange()" class="accent-[#10b981]">
                    <label for="filter-vehicle" class="ml-3">ยานพาหนะ</label>
                </div>
            </div>
        </header>

        <div id="instruction" class="text-center py-6 px-8 bg-indigo-50 text-indigo-600 rounded-3xl mb-12 border-2 border-dashed border-indigo-100 animate-pulse">
            <p class="text-xl md:text-2xl font-bold">👉 กรุณาเลือกหมวดหมู่ปฏิทินด้านบน</p>
        </div>

        <div class="relative">
            <div id="loading" class="hidden absolute inset-0 bg-white/90 z-20 flex flex-col justify-center items-center rounded-3xl backdrop-blur-sm">
                <div class="w-16 h-16 border-8 border-slate-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                <p class="text-xl font-bold text-slate-700">กำลังอัปเดตข้อมูล...</p>
            </div>
            <div id='calendar'></div>
        </div>
    </div>

    <script>
        let calendar;
        let allEventsRaw = [];
        const gasUrl = 'https://script.google.com/macros/s/AKfycbxESHXBgm20xnXorOiDl-w3kFt6RZtU-iLUqBiJvmZKKwyH6SraH5QrMDSj6dSuhRbpA/exec';

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'th',
                height: 'auto',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: ''
                },
                buttonText: { today: 'วันนี้' },
                dayCellDidMount: function(info) {
                    updateDayCell(info.date, info.el);
                },
                dateClick: (info) => showDailyEvents(info.dateStr)
            });
            calendar.render();
        });

        function updateDayCell(date, cellEl) {
            const offset = date.getTimezoneOffset() * 60000;
            const localISOTime = new Date(date - offset).toISOString().split('T')[0];
            const events = filterData(allEventsRaw).filter(e => e.start.startsWith(localISOTime));
            
            const oldBadge = cellEl.querySelector('.event-count-container');
            if (oldBadge) oldBadge.remove();

            if (events.length > 0) {
                const container = document.createElement('div');
                container.className = 'event-count-container flex justify-center items-center mt-2';
                container.innerHTML = `<span class="event-count-badge">${events.length} งาน</span>`;
                cellEl.querySelector('.fc-daygrid-day-frame').appendChild(container);
            }
        }

        async function handleFilterChange() {
            const checked = document.querySelectorAll('input[type="checkbox"]:checked').length > 0;
            document.getElementById('instruction').style.display = checked ? 'none' : 'block';
            
            if (checked && allEventsRaw.length === 0) {
                document.getElementById('loading').classList.remove('hidden');
                try {
                    const res = await fetch(gasUrl);
                    allEventsRaw = await res.json();
                } catch (e) { alert('เกิดข้อผิดพลาดในการโหลดข้อมูล'); }
                document.getElementById('loading').classList.add('hidden');
            }
            calendar.render(); 
        }

        function filterData(events) {
            const showDir = document.getElementById('filter-director').checked;
            const showSch = document.getElementById('filter-school').checked;
            const showVeh = document.getElementById('filter-vehicle').checked;
            return events.filter(ev => {
                if (ev.extendedProps.groupId === 'director') return showDir;
                if (ev.extendedProps.groupId === 'school') return showSch;
                if (ev.extendedProps.groupId === 'vehicle') return showVeh;
                return false;
            });
        }

        function showDailyEvents(dateStr) {
            const events = filterData(allEventsRaw).filter(e => e.start.startsWith(dateStr));
            const container = document.getElementById('dailyEventsContainer');
            document.getElementById('modalDate').innerText = new Date(dateStr).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
            container.innerHTML = '';
            
            if (events.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16">
                        <p class="text-xl text-slate-400 font-bold">ไม่มีกิจกรรมในวันที่เลือก</p>
                    </div>`;
            } else {
                events.forEach(ev => {
                    const card = document.createElement('div');
                    card.className = 'event-card shadow-sm';
                    card.style.borderColor = ev.backgroundColor;
                    
                    let desc = ev.extendedProps.description || 'ไม่มีรายละเอียดเพิ่มเติม';
                    const urlRegex = /(https?:\/\/[^\s]+)/g;
                    desc = desc.replace(urlRegex, (url) => `
                        <a href="${url}" target="_blank" class="flex items-center justify-center gap-2 mt-4 p-4 bg-indigo-600 text-white rounded-xl text-base font-bold text-center shadow-lg active:scale-95 transition-all">
                            📎 เปิดดูไฟล์แนบ
                        </a>`);

                    card.innerHTML = `
                        <div class="event-card-dept" style="color:${ev.backgroundColor}">${ev.extendedProps.dept}</div>
                        <div class="event-card-title">${ev.title}</div>
                        <div class="event-card-desc whitespace-pre-line">${desc}</div>
                    `;
                    container.appendChild(card);
                });
            }
            document.getElementById('dayModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('dayModal').style.display = 'none'; }
    </script>
</body>
</html>
