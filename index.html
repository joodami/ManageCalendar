<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการกิจกรรมโรงเรียน</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        body { font-family: 'Prompt', sans-serif; }
        .fc-event { cursor: pointer; border-radius: 4px; border: none; padding: 2px 5px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div class="max-w-6xl mx-auto p-6">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-indigo-700">ระบบจัดการปฏิทินกิจกรรม</h1>
            <p class="text-slate-500">เลือกกลุ่มงานหรือกลุ่มสาระเพื่อดูตารางงาน</p>
        </header>

        <div class="flex flex-wrap justify-center gap-4 mb-8">
            <button onclick="loadCalendar('group1')" class="px-6 py-2 bg-white border-2 border-indigo-500 text-indigo-700 rounded-full hover:bg-indigo-500 hover:text-white transition">ตารางงานผู้อำนวยการ</button>
            <button onclick="loadCalendar('group2')" class="px-6 py-2 bg-white border-2 border-emerald-500 text-emerald-700 rounded-full hover:bg-emerald-500 hover:text-white transition">กลุ่มงานยานพาหนะ</button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-200">
            <div id='calendar'></div>
        </div>
    </div>

    <script>
        let calendar;
        const gasUrl = 'https://script.google.com/macros/s/AKfycbxESHXBgm20xnXorOiDl-w3kFt6RZtU-iLUqBiJvmZKKgwyH6SraH5QrMDSj6dSuhRbpA/exec';

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'th',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek'
                },
                themeSystem: 'standard'
            });
            calendar.render();
            loadCalendar('group1'); // โหลดข้อมูลเริ่มต้น
        });

        async function loadCalendar(groupId) {
            // แสดง Loading
            const events = await fetch(`${gasUrl}?group=${groupId}`).then(res => res.json());
            
            calendar.removeAllEvents();
            calendar.addEventSource(events);
        }
    </script>
</body>
</html>
