<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการกิจกรรมโรงเรียน</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f0f4f8; }
        .fc-event { cursor: pointer; padding: 2px 4px; border-radius: 4px; border: none; }
        .filter-checkbox:checked + label { font-weight: 600; color: #1e293b; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center md:text-left flex flex-col md:flex-row justify-between items-end gap-4">
            <div>
                <h1 class="text-4xl font-bold text-slate-800">ปฏิทินกิจกรรมรวม</h1>
                <p class="text-slate-500 text-lg">แสดงกิจกรรมทั้งหมดแยกตามฝ่ายงาน</p>
            </div>
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-wrap gap-5">
                <div class="flex items-center">
                    <input type="checkbox" id="filter-director" checked onchange="updateFilter()" class="w-5 h-5 accent-[#6366f1] cursor-pointer">
                    <label for="filter-director" class="ml-2 text-slate-600 cursor-pointer text-sm flex items-center">
                        <span class="w-3 h-3 rounded-full bg-[#6366f1] mr-2"></span> งานผู้อำนวยการ
                    </label>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="filter-school" checked onchange="updateFilter()" class="w-5 h-5 accent-[#6fa8dc] cursor-pointer">
                    <label for="filter-school" class="ml-2 text-slate-600 cursor-pointer text-sm flex items-center">
                        <span class="w-3 h-3 rounded-full bg-[#6fa8dc] mr-2"></span> กิจกรรมโรงเรียน
                    </label>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="filter-vehicle" checked onchange="updateFilter()" class="w-5 h-5 accent-[#10b981] cursor-pointer">
                    <label for="filter-vehicle" class="ml-2 text-slate-600 cursor-pointer text-sm flex items-center">
                        <span class="w-3 h-3 rounded-full bg-[#10b981] mr-2"></span> งานยานพาหนะ
                    </label>
                </div>
            </div>
        </header>

        <div class="bg-white p-4 md:p-8 rounded-3xl shadow-2xl border border-white relative">
            <div id="loading" class="absolute inset-0 bg-white/80 z-10 flex justify-center items-center font-bold text-indigo-600 rounded-3xl">
                กำลังดึงข้อมูลกิจกรรม...
            </div>
            <div id='calendar'></div>
        </div>
    </div>

    <script>
        let calendar;
        let allEventsRaw = [];
        // วาง URL ของ Google Apps Script ที่ Deploy ล่าสุดที่นี่
        const gasUrl = 'https://script.google.com/macros/s/AKfycbxESHXBgm20xnXorOiDl-w3kFt6RZtU-iLUqBiJvmZKKgwyH6SraH5QrMDSj6dSuhRbpA/exec'; 

        document.addEventListener('DOMContentLoaded', async function() {
            const calendarEl = document.getElementById('calendar');
            
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'th',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,listMonth'
                },
                buttonText: { today: 'วันนี้', month: 'เดือน', week: 'สัปดาห์', list: 'รายการ' },
                events: function(fetchInfo, successCallback, failureCallback) {
                    successCallback(filterEvents(allEventsRaw));
                },
                eventClick: function(info) {
                    alert('กิจกรรม: ' + info.event.title + '\nฝ่าย: ' + info.event.extendedProps.dept + (info.event.extendedProps.description ? '\nรายละเอียด: ' + info.event.extendedProps.description : ''));
                }
            });

            try {
                const response = await fetch(gasUrl);
                allEventsRaw = await response.json();
                document.getElementById('loading').classList.add('hidden');
                calendar.render();
            } catch (error) {
                document.getElementById('loading').innerText = 'ไม่สามารถโหลดข้อมูลได้ กรุณาตรวจสอบการแชร์ปฏิทิน';
            }
        });

        function filterEvents(events) {
            const showDirector = document.getElementById('filter-director').checked;
            const showSchool = document.getElementById('filter-school').checked;
            const showVehicle = document.getElementById('filter-vehicle').checked;

            return events.filter(event => {
                if (event.extendedProps.groupId === 'director') return showDirector;
                if (event.extendedProps.groupId === 'school') return showSchool;
                if (event.extendedProps.groupId === 'vehicle') return showVehicle;
                return true;
            });
        }

        function updateFilter() {
            calendar.refetchEvents();
        }
    </script>
</body>
</html>
