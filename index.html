<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ปฏิทินกิจกรรม - โรงเรียนพิมานพิทยาสรรค์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root {
            --bg-light: #f1f5f9;
            --sarabun: 'Sarabun', sans-serif;
            --primary: #4f46e5;
        }
        body { 
            font-family: var(--sarabun); 
            background-color: var(--bg-light); 
            color: #1e293b; 
            -webkit-font-smoothing: antialiased; 
            overflow-x: hidden;
        }

        /* ปฏิทินระดับ Desktop */
        .fc { 
            background: #ffffff; 
            border-radius: 2.5rem; 
            padding: clamp(1rem, 5vw, 2.5rem); 
            border: none !important; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); 
        }
        .fc-toolbar-title { 
            font-size: clamp(1.4rem, 4vw, 2.2rem) !important; 
            font-weight: 800 !important; 
            color: #0f172a;
        }
        
        /* ช่องวันที่ */
        .fc-daygrid-day-number { 
            font-size: 1.1rem !important; 
            font-weight: 700; 
            color: #64748b; 
            padding: 12px !important; 
        }
        .fc-daygrid-day-frame { 
            min-height: 100px !important; 
            transition: background 0.2s; 
            cursor: pointer; 
        }
        .fc-daygrid-day:hover { background: #f8fafc; }
        .fc-day-today { background: #eff6ff !important; }
        .fc-day-today .fc-daygrid-day-number { color: var(--primary); }

        /* Badge จำนวนงาน (แก้ให้ Real-time) */
        .event-count-container { 
            position: absolute; 
            inset: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            pointer-events: none; 
        }
        .event-count-badge {
            background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
            color: white; 
            width: 42px; 
            height: 42px; 
            border-radius: 50%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            font-size: 1.3rem; 
            font-weight: 900; 
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

        /* ฟิลเตอร์แบบ Modern Pills */
        .filter-item { 
            display: flex; 
            align-items: center; 
            background: white; 
            padding: 10px 22px; 
            border-radius: 1.5rem; 
            border: 2px solid #e2e8f0; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.2s;
            user-select: none;
        }
        .filter-item:hover { transform: translateY(-2px); }
        .filter-item:has(input:checked) { 
            border-color: currentColor; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            background: #fff;
        }
        .filter-item input { width: 18px; height: 18px; accent-color: currentColor; }

        /* การ์ดรายการ */
        .list-card { 
            background: white; 
            border-radius: 2rem; 
            padding: 2rem; 
            border-left: 12px solid; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
            transition: transform 0.2s;
        }
        .list-card:hover { transform: scale(1.02); }

        /* Modal */
        #dayModal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(15, 23, 42, 0.8); 
            z-index: 9999; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(12px); 
        }
        .modal-content { 
            background: white; 
            border-radius: 3rem; 
            max-width: 600px; 
            width: 95%; 
            max-height: 85vh; 
            overflow: hidden; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 640px) {
            .fc-daygrid-day-frame { min-height: 80px !important; }
            .event-count-badge { width: 34px; height: 34px; font-size: 1rem; }
            .filter-item { padding: 8px 14px; font-size: 0.85rem; }
        }
        
        /* ซ่อน Event เดิมของ FC */
        .fc-daygrid-event-harness { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-12">

    <div id="dayModal" onclick="if(event.target==this) closeModal()">
        <div class="modal-content animate-in slide-in-from-bottom duration-300">
            <div class="p-8 border-b flex justify-between items-center bg-slate-50">
                <div>
                    <p class="text-indigo-600 font-bold text-sm uppercase tracking-widest">รายการกิจกรรม</p>
                    <h2 id="modalDate" class="font-black text-2xl text-slate-900"></h2>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow text-slate-400 hover:text-red-500 transition-colors">✕</button>
            </div>
            <div id="dailyEventsContainer" class="p-8 overflow-y-auto space-y-6 max-h-[50vh] bg-white"></div>
            <div class="p-6 bg-slate-50 border-t">
                <button onclick="closeModal()" class="w-full py-4 bg-slate-900 hover:bg-black text-white rounded-2xl font-black text-lg transition-all shadow-lg">เข้าใจแล้ว</button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
        <header class="mb-12 flex flex-col items-center gap-8 text-center">
            <div class="flex flex-col md:flex-row items-center gap-6">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Emblem_of_Thailand.svg/100px-Emblem_of_Thailand.svg.png" class="w-20 h-20 object-contain drop-shadow-lg">
                <div class="text-center md:text-left">
                    <h1 class="text-3xl md:text-5xl font-black text-slate-900 tracking-tight">ระบบปฏิทินกิจกรรม</h1>
                    <p class="text-indigo-600 text-lg md:text-xl font-bold">โรงเรียนพิมานพิทยาสรรค์</p>
                </div>
            </div>

            <div class="flex bg-slate-200 p-1.5 rounded-[2rem] w-full max-w-[350px] shadow-inner">
                <button onclick="switchView('calendar')" id="btnCal" class="flex-1 py-3 rounded-[1.5rem] font-black text-sm md:text-base bg-white shadow-md text-indigo-600 transition-all">📅 ปฏิทิน</button>
                <button onclick="switchView('list')" id="btnList" class="flex-1 py-3 rounded-[1.5rem] font-black text-sm md:text-base text-slate-500 transition-all">📋 รายการ</button>
            </div>

            <div class="flex flex-wrap gap-3 justify-center">
                <div class="filter-item border-slate-900 text-slate-900" style="color: #0f172a">
                    <input type="checkbox" id="filter-all" onchange="toggleAll(this)">
                    <label for="filter-all" class="ml-2">ทั้งหมด</label>
                </div>
                <div class="filter-item border-[#6366f1] text-[#6366f1]">
                    <input type="checkbox" id="filter-director" class="dept-filter" onchange="handleFilterChange()">
                    <label for="filter-director" class="ml-2">ผอ.</label>
                </div>
                <div class="filter-item border-[#0ea5e9] text-[#0ea5e9]">
                    <input type="checkbox" id="filter-school" class="dept-filter" onchange="handleFilterChange()">
                    <label for="filter-school" class="ml-2">กิจกรรม</label>
                </div>
                <div class="filter-item border-[#10b981] text-[#10b981]">
                    <input type="checkbox" id="filter-vehicle" class="dept-filter" onchange="handleFilterChange()">
                    <label for="filter-vehicle" class="ml-2">ยานพาหนะ</label>
                </div>
            </div>
        </header>

        <div id="instruction" class="text-center p-16 bg-white border-4 border-dashed rounded-[3rem] mb-8 text-slate-300 font-black text-2xl">
            SELECT CATEGORY ABOVE
        </div>

        <div class="relative">
            <div id="loading" class="hidden absolute inset-0 bg-white/90 z-20 flex flex-col justify-center items-center rounded-[3rem]">
                <div class="w-16 h-16 border-8 border-slate-100 border-t-indigo-600 rounded-full animate-spin"></div>
                <p class="mt-4 font-bold text-slate-400">กำลังดึงข้อมูล...</p>
            </div>
            
            <div id="calendarView" class="transition-all duration-500"><div id='calendar'></div></div>
            
            <div id="listView" class="space-y-6 hidden">
                <div class="flex items-center gap-4 mb-8">
                    <div class="h-1 w-12 bg-indigo-600 rounded-full"></div>
                    <h3 class="font-black text-2xl text-slate-800">กิจกรรมที่กำลังจะมาถึง</h3>
                </div>
                <div id="listContainer" class="grid gap-6"></div>
            </div>
        </div>
        
        <footer class="mt-20 text-center text-slate-400 font-medium pb-10">
            © 2026 Phiman Phitthayasan School • Vehicle Work Department
        </footer>
    </div>

    <script>
        let calendar;
        let allEventsRaw = [];
        const gasUrl = 'https://script.google.com/macros/s/AKfycbxESHXBgm20xnXorOiDl-w3kFt6RZtU-iLUqBiJvmZKKgwyH6SraH5QrMDSj6dSuhRbpA/exec';

        document.addEventListener('DOMContentLoaded', function() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'th',
                height: 'auto',
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                dayCellDidMount: (info) => renderBadge(info.date, info.el),
                dateClick: (info) => showDailyEvents(info.dateStr),
                // เพิ่มความลื่นไหล
                handleWindowResize: true,
                expandRows: true
            });
            calendar.render();
        });

        function switchView(mode) {
            const isCal = mode === 'calendar';
            const calView = document.getElementById('calendarView');
            const listView = document.getElementById('listView');
            
            calView.classList.toggle('hidden', !isCal);
            listView.classList.toggle('hidden', isCal);
            
            document.getElementById('btnCal').className = isCal ? 'flex-1 py-3 rounded-[1.5rem] font-black text-sm md:text-base bg-white shadow-md text-indigo-600' : 'flex-1 py-3 rounded-[1.5rem] font-black text-sm md:text-base text-slate-500';
            document.getElementById('btnList').className = !isCal ? 'flex-1 py-3 rounded-[1.5rem] font-black text-sm md:text-base bg-white shadow-md text-indigo-600' : 'flex-1 py-3 rounded-[1.5rem] font-black text-sm md:text-base text-slate-500';
            
            if (!isCal) updateListView();
            else calendar.render(); // บังคับวาดใหม่เมื่อสลับกลับมา
        }

        function toggleAll(source) {
            document.querySelectorAll('.dept-filter').forEach(f => f.checked = source.checked);
            handleFilterChange();
        }

        async function handleFilterChange() {
            const checkedFilters = document.querySelectorAll('.dept-filter:checked');
            document.getElementById('instruction').style.display = checkedFilters.length > 0 ? 'none' : 'block';
            
            if (checkedFilters.length > 0 && allEventsRaw.length === 0) {
                document.getElementById('loading').classList.remove('hidden');
                try {
                    const res = await fetch(gasUrl);
                    allEventsRaw = await res.json();
                } catch (e) { console.error(e); }
                document.getElementById('loading').classList.add('hidden');
            }
            
            // --- หัวใจสำคัญ: บังคับให้ FullCalendar วาดใหม่ทันทีเพื่อให้ Badge อัปเดต ---
            calendar.render(); 
            updateListView();
        }

        function filterData(events) {
            const showDir = document.getElementById('filter-director').checked;
            const showSch = document.getElementById('filter-school').checked;
            const showVeh = document.getElementById('filter-vehicle').checked;
            return events.filter(ev => {
                const gid = ev.extendedProps?.groupId;
                return (gid === 'director' && showDir) || (gid === 'school' && showSch) || (gid === 'vehicle' && showVeh);
            });
        }

        function renderBadge(date, cellEl) {
            // ปรับเวลาให้ตรงกับ Timezone ไทย
            const d = new Date(date);
            d.setHours(d.getHours() + 7);
            const dateStr = d.toISOString().split('T')[0];
            
            const filtered = filterData(allEventsRaw);
            const events = filtered.filter(e => e.start.split('T')[0] === dateStr);
            
            const old = cellEl.querySelector('.event-count-container');
            if (old) old.remove();

            if (events.length > 0) {
                const container = document.createElement('div');
                container.className = 'event-count-container';
                container.innerHTML = `<div class="event-count-badge">${events.length}</div>`;
                cellEl.querySelector('.fc-daygrid-day-frame').appendChild(container);
            }
        }

        function updateListView() {
            const container = document.getElementById('listContainer');
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const events = filterData(allEventsRaw).filter(e => new Date(e.start) >= today);
            container.innerHTML = events.length === 0 ? '<div class="text-center py-20 text-slate-400 font-bold">ไม่พบกิจกรรมที่เลือก</div>' : '';
            
            events.slice(0, 15).forEach(ev => {
                const card = document.createElement('div');
                card.className = 'list-card';
                card.style.borderColor = ev.backgroundColor;
                const d = new Date(ev.start).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
                
                card.innerHTML = `
                    <div class="flex flex-col md:flex-row justify-between md:items-center gap-4 mb-4">
                        <span class="text-xs font-black uppercase px-4 py-1.5 rounded-full text-white self-start" style="background:${ev.backgroundColor}">${ev.extendedProps.dept}</span>
                        <span class="text-slate-400 font-bold flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>${d}</span>
                    </div>
                    <div class="text-2xl font-black text-slate-900 mb-3">${ev.title}</div>
                    <p class="text-slate-500 leading-relaxed mb-6 line-clamp-2">${ev.extendedProps.description || 'ไม่มีรายละเอียดเพิ่มเติม'}</p>
                    <button onclick="showDailyEvents('${ev.start.split('T')[0]}')" class="text-indigo-600 font-black flex items-center gap-2 hover:gap-4 transition-all">ดูรายละเอียดฉบับเต็ม <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 8l4 4m0 0l-4 4m4-4H3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
                `;
                container.appendChild(card);
            });
        }

        function showDailyEvents(dateStr) {
            const events = filterData(allEventsRaw).filter(e => e.start.split('T')[0] === dateStr);
            const container = document.getElementById('dailyEventsContainer');
            document.getElementById('modalDate').innerText = new Date(dateStr).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
            
            container.innerHTML = '';
            events.forEach(ev => {
                const card = document.createElement('div');
                card.className = 'p-6 rounded-3xl border-2 border-slate-100 bg-white shadow-sm';
                card.style.borderLeftColor = ev.backgroundColor;
                card.style.borderLeftWidth = '8px';
                
                let desc = (ev.extendedProps.description || 'ไม่มีรายละเอียด').replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="block mt-4 p-4 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-center rounded-2xl font-bold transition-all underline">📎 คลิกเพื่อเปิดไฟล์แนบ / ลิงก์</a>');
                
                card.innerHTML = `
                    <div class="text-[10px] font-black tracking-widest uppercase mb-2" style="color:${ev.backgroundColor}">${ev.extendedProps.dept}</div>
                    <div class="text-xl font-black text-slate-900 mb-3">${ev.title}</div>
                    <div class="text-slate-600 leading-relaxed whitespace-pre-line">${desc}</div>
                `;
                container.appendChild(card);
            });
            document.getElementById('dayModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('dayModal').classList.add('hidden'); setTimeout(() => { document.getElementById('dayModal').style.display = 'none'; document.getElementById('dayModal').classList.remove('hidden'); }, 200); }
    </script>
</body>
</html>
