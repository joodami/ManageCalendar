<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ปฏิทินกิจกรรม - Phiman Phitthayasan</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root {
            --bg-dark: #020617; /* สีพื้นหลังเข้มจัด */
            --accent-color: #6366f1;
        }
        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: var(--bg-dark);
            color: #f8fafc;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* --- ปฏิทินหลัก --- */
        .fc { 
            background: #ffffff; 
            border-radius: 2.5rem; 
            padding: clamp(1rem, 4vw, 2.5rem); 
            border: none !important; 
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.2); /* เพิ่มเงาสีม่วงจางๆ */
            color: #1e293b;
        }
        .fc-header-toolbar { margin-bottom: 2.5rem !important; gap: 15px; }
        .fc-toolbar-title { 
            font-size: clamp(1.6rem, 6vw, 2.5rem) !important; 
            font-weight: 900 !important; 
            color: #0f172a;
        }

        /* --- ปุ่มควบคุม --- */
        .fc-button {
            background: #f1f5f9 !important;
            border: none !important;
            color: #475569 !important;
            font-weight: 700 !important;
            padding: 14px 22px !important;
            border-radius: 18px !important;
        }
        .fc-button-active { background: #0f172a !important; color: white !important; }

        /* --- วันที่ในปฏิทิน --- */
        .fc-daygrid-day-number { 
            font-size: 1.3rem !important; 
            padding: 12px !important; 
            font-weight: 800;
            color: #334155;
        }
        .fc-daygrid-day-frame { min-height: 110px !important; cursor: pointer; transition: 0.2s; }
        .fc-daygrid-day-frame:hover { background: #f8fafc; }
        .fc-day-today { background: #f5f3ff !important; border: 2px solid #6366f1 !important; }

        /* --- ป้ายแจ้งเตือน (Badge) --- */
        .event-count-badge {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 8px 18px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 900;
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.6);
            display: inline-block;
        }

        /* --- Modal รายละเอียด --- */
        #dayModal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0, 0, 0, 0.95); z-index: 9999; 
            align-items: center; justify-content: center; padding: 12px; 
            backdrop-filter: blur(15px); 
        }
        .modal-content { 
            background: #ffffff; border-radius: 3rem; 
            max-width: 650px; width: 100%; max-height: 90vh; 
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
        }
        
        /* --- การ์ดกิจกรรม --- */
        .event-card { 
            border-left: 12px solid; background: #f8fafc; 
            padding: 28px; border-radius: 2rem; margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .event-card-title { 
            font-size: 1.6rem; 
            font-weight: 900; color: #0f172a; line-height: 1.2;
            margin-bottom: 10px;
        }
        .event-card-dept { font-size: 1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px; }
        .event-card-desc { font-size: 1.25rem; color: #334155; line-height: 1.6; font-weight: 500; }

        /* --- ฟิลเตอร์ (Pills) --- */
        .filter-item { 
            display: flex; align-items: center; background: rgba(255, 255, 255, 0.05); 
            padding: 15px 25px; border-radius: 22px; border: 3px solid rgba(255, 255, 255, 0.1); 
            font-size: 1.2rem; font-weight: 800; color: #f8fafc;
            cursor: pointer; transition: 0.3s;
        }
        .filter-item:has(input:checked) { 
            border-color: currentColor; 
            background: rgba(255, 255, 255, 0.1); 
            transform: scale(1.05);
            box-shadow: 0 0 20px currentColor;
        }
        .filter-item input { width: 26px; height: 26px; cursor: pointer; }

        @media (max-width: 640px) {
            .fc { border-radius: 1.8rem; padding: 1.2rem; }
            .fc-daygrid-day-frame { min-height: 90px !important; }
            .event-count-badge { font-size: 0.95rem; padding: 6px 12px; }
            .event-card-title { font-size: 1.4rem; }
            .event-card-desc { font-size: 1.15rem; }
            .filter-item { padding: 12px 18px; font-size: 1rem; }
        }

        .fc-daygrid-event-harness { display: none !important; } 
    </style>
</head>
<body class="p-3 md:p-10 lg:p-20">

    <div id="dayModal" onclick="if(event.target==this) closeModal()">
        <div class="modal-content animate-in zoom-in duration-300">
            <div class="p-8 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                <div>
                    <h2 id="modalDate" class="text-3xl font-black text-slate-900 tracking-tight"></h2>
                    <p class="text-indigo-600 font-black text-xl mt-1">📌 รายการวันนี้</p>
                </div>
                <button onclick="closeModal()" class="p-4 bg-slate-100 rounded-full text-slate-500 hover:bg-red-500 hover:text-white transition-all">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>
            </div>
            <div id="dailyEventsContainer" class="p-6 md:p-12 overflow-y-auto space-y-8 bg-slate-50">
                </div>
            <div class="p-6 bg-white border-t">
                <button onclick="closeModal()" class="w-full py-6 bg-slate-900 text-white rounded-[2rem] text-2xl font-black shadow-2xl active:scale-95 transition-all">เข้าใจแล้ว</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="mb-14 flex flex-col lg:flex-row justify-between items-center gap-10">
            <div class="flex items-center gap-8">
                <div class="p-5 bg-white rounded-[2.5rem] shadow-2xl">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Emblem_of_Thailand.svg/100px-Emblem_of_Thailand.svg.png" 
                         alt="School Logo" class="w-20 h-20 md:w-28 md:h-28 object-contain">
                </div>
                <div>
                    <h1 class="text-4xl md:text-7xl font-black text-white tracking-tighter leading-none">ปฏิทินกิจกรรม</h1>
                    <p class="text-xl md:text-3xl font-bold text-indigo-400 mt-3 uppercase tracking-widest">Phiman Phitthayasan</p>
                </div>
            </div>

            <div class="flex flex-wrap gap-4 justify-center">
                <div class="filter-item border-[#818cf8] text-[#818cf8]">
                    <input type="checkbox" id="filter-director" onchange="handleFilterChange()" class="accent-[#818cf8]">
                    <label for="filter-director" class="ml-4">ผอ.</label>
                </div>
                <div class="filter-item border-[#38bdf8] text-[#38bdf8]">
                    <input type="checkbox" id="filter-school" onchange="handleFilterChange()" class="accent-[#38bdf8]">
                    <label for="filter-school" class="ml-4">กิจกรรม</label>
                </div>
                <div class="filter-item border-[#34d399] text-[#34d399]">
                    <input type="checkbox" id="filter-vehicle" onchange="handleFilterChange()" class="accent-[#34d399]">
                    <label for="filter-vehicle" class="ml-4">รถยนต์</label>
                </div>
            </div>
        </header>

        <div id="instruction" class="text-center py-12 px-10 bg-white/5 border-4 border-dashed border-white/20 rounded-[3.5rem] mb-12">
            <p class="text-3xl md:text-4xl font-black text-white/40 animate-pulse font-serif">READY TO VIEW?</p>
            <p class="text-xl text-indigo-400 font-bold mt-2">กรุณาเลือกหมวดหมู่ด้านบน</p>
        </div>

        <div class="relative">
            <div id="loading" class="hidden absolute inset-0 bg-slate-950/90 z-20 flex flex-col justify-center items-center rounded-[3rem] backdrop-blur-2xl">
                <div class="w-28 h-28 border-[12px] border-white/5 border-t-indigo-500 rounded-full animate-spin mb-8"></div>
                <p class="text-3xl font-black text-white tracking-widest">LOADING DATA...</p>
            </div>
            <div id='calendar'></div>
        </div>
    </div>

    <script>
        let calendar;
        let allEventsRaw = [];
        const gasUrl = 'https://script.google.com/macros/s/AKfycbxESHXBgm20xnXorOiDl-w3kFt6RZtU-iLUqBiJvmZKKgwyH6SraH5QrMDSj6dSuhRbpA/exec';

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'th',
                height: 'auto',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: ''
                },
                buttonText: { today: 'วันนี้' },
                dayCellDidMount: function(info) {
                    updateDayCell(info.date, info.el);
                },
                dateClick: (info) => showDailyEvents(info.dateStr)
            });
            calendar.render();
        });

        function updateDayCell(date, cellEl) {
            const offset = date.getTimezoneOffset() * 60000;
            const localISOTime = new Date(date - offset).toISOString().split('T')[0];
            const events = filterData(allEventsRaw).filter(e => e.start.startsWith(localISOTime));
            
            const oldBadge = cellEl.querySelector('.event-count-container');
            if (oldBadge) oldBadge.remove();

            if (events.length > 0) {
                const container = document.createElement('div');
                container.className = 'event-count-container flex justify-center items-center mt-2';
                container.innerHTML = `<span class="event-count-badge">${events.length} งาน</span>`;
                cellEl.querySelector('.fc-daygrid-day-frame').appendChild(container);
            }
        }

        async function handleFilterChange() {
            const checked = document.querySelectorAll('input[type="checkbox"]:checked').length > 0;
            document.getElementById('instruction').style.display = checked ? 'none' : 'block';
            
            if (checked && allEventsRaw.length === 0) {
                document.getElementById('loading').classList.remove('hidden');
                try {
                    const res = await fetch(gasUrl);
                    allEventsRaw = await res.json();
                } catch (e) { alert('การโหลดข้อมูลล้มเหลว'); }
                document.getElementById('loading').classList.add('hidden');
            }
            calendar.render(); 
        }

        function filterData(events) {
            const showDir = document.getElementById('filter-director').checked;
            const showSch = document.getElementById('filter-school').checked;
            const showVeh = document.getElementById('filter-vehicle').checked;
            return events.filter(ev => {
                if (ev.extendedProps.groupId === 'director') return showDir;
                if (ev.extendedProps.groupId === 'school') return showSch;
                if (ev.extendedProps.groupId === 'vehicle') return showVeh;
                return false;
            });
        }

        function showDailyEvents(dateStr) {
            const events = filterData(allEventsRaw).filter(e => e.start.startsWith(dateStr));
            const container = document.getElementById('dailyEventsContainer');
            document.getElementById('modalDate').innerText = new Date(dateStr).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
            container.innerHTML = '';
            
            if (events.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-24">
                        <p class="text-3xl text-slate-300 font-black">NO EVENTS TODAY</p>
                    </div>`;
            } else {
                events.forEach(ev => {
                    const card = document.createElement('div');
                    card.className = 'event-card';
                    card.style.borderColor = ev.backgroundColor;
                    
                    let desc = ev.extendedProps.description || 'ไม่มีรายละเอียดเพิ่มเติม';
                    const urlRegex = /(https?:\/\/[^\s]+)/g;
                    desc = desc.replace(urlRegex, (url) => `
                        <a href="${url}" target="_blank" class="flex items-center justify-center gap-4 mt-8 p-6 bg-indigo-600 text-white rounded-[2rem] text-xl font-black shadow-2xl hover:bg-indigo-700 transition-all">
                            📄 คลิกเปิดเอกสาร
                        </a>`);

                    card.innerHTML = `
                        <div class="event-card-dept" style="color:${ev.backgroundColor}">${ev.extendedProps.dept}</div>
                        <div class="event-card-title">${ev.title}</div>
                        <div class="event-card-desc whitespace-pre-line">${desc}</div>
                    `;
                    container.appendChild(card);
                });
            }
            document.getElementById('dayModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('dayModal').style.display = 'none'; }
    </script>
</body>
</html>
