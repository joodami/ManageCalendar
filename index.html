<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบปฏิทินกิจกรรม - Phiman</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background: #f1f5f9; color: #334155; }
        .fc { background: white; border-radius: 1.5rem; padding: 0.5rem; border: none !important; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .fc-header-toolbar { margin-bottom: 1rem !important; padding: 0.5rem; }
        .fc-toolbar-title { font-size: 1.1rem !important; font-weight: 600; color: #1e293b; }
        .fc-daygrid-event { background: transparent !important; border: none !important; margin: 1px 0 !important; cursor: pointer; }
        
        /* Modal Style */
        #dayModal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 9999; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(8px); }
        .modal-content { background: white; border-radius: 1.5rem; max-width: 450px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
        .event-card { border-left: 5px solid; background: #f8fafc; padding: 12px; border-radius: 12px; margin-bottom: 10px; }

        /* Checkbox Filter */
        .filter-item { display: flex; align-items: center; background: white; padding: 6px 14px; border-radius: 9999px; border: 1px solid #e2e8f0; font-size: 0.85rem; cursor: pointer; }
        input[type="checkbox"]:checked + label { font-weight: 600; }
        
        @media (max-width: 640px) {
            .fc-toolbar-title { font-size: 0.95rem !important; }
            h1 { font-size: 1.3rem !important; }
        }
    </style>
</head>
<body class="p-3 md:p-8">

    <div id="dayModal">
        <div class="modal-content">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <div>
                    <h2 id="modalDate" class="text-xl font-bold text-slate-800"></h2>
                    <p class="text-sm text-slate-500">รายการกิจกรรมวันนี้</p>
                </div>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-full text-slate-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>
            </div>
            <div id="dailyEventsContainer" class="p-6 overflow-y-auto space-y-4"></div>
            <div class="p-4 bg-slate-50 text-center">
                <button onclick="closeModal()" class="px-6 py-2 bg-slate-800 text-white rounded-xl text-sm font-medium w-full">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Emblem_of_Thailand.svg/100px-Emblem_of_Thailand.svg.png" 
                     alt="School Logo" class="w-12 h-12 object-contain">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">ระบบปฏิทินกิจกรรมรวม</h1>
                    <p class="text-xs font-semibold text-indigo-600 uppercase tracking-widest">Phiman Phitthayasan School</p>
                </div>
            </div>

            <div class="flex flex-wrap gap-2 justify-center">
                <div class="filter-item border-[#8B5CF6] text-[#8B5CF6]">
                    <input type="checkbox" id="filter-director" onchange="handleFilterChange()" class="w-4 h-4 accent-[#8B5CF6] cursor-pointer">
                    <label for="filter-director" class="ml-2 cursor-pointer">ผอ.</label>
                </div>
                <div class="filter-item border-[#0ea5e9] text-[#0ea5e9]">
                    <input type="checkbox" id="filter-school" onchange="handleFilterChange()" class="w-4 h-4 accent-[#0ea5e9] cursor-pointer">
                    <label for="filter-school" class="ml-2 cursor-pointer">กิจกรรม</label>
                </div>
                <div class="filter-item border-[#10b981] text-[#10b981]">
                    <input type="checkbox" id="filter-vehicle" onchange="handleFilterChange()" class="w-4 h-4 accent-[#10b981] cursor-pointer">
                    <label for="filter-vehicle" class="ml-2 cursor-pointer">ยานพาหนะ</label>
                </div>
            </div>
        </header>

        <p id="instruction" class="text-center bg-indigo-50 text-indigo-600 py-3 rounded-2xl mb-6 font-medium animate-pulse border border-indigo-100">
            👆 กรุณาเลือกปฏิทินที่ต้องการตรวจสอบข้อมูล
        </p>

        <div class="relative min-h-[450px]">
            <div id="loading" class="hidden absolute inset-0 bg-white/70 z-10 flex flex-col justify-center items-center rounded-3xl backdrop-blur-sm">
                <div class="w-10 h-10 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin mb-3"></div>
                <p class="text-sm font-bold text-slate-600">กำลังดึงข้อมูล...</p>
            </div>
            <div id='calendar'></div>
        </div>
    </div>

    <script>
        let calendar;
        let allEventsRaw = [];
        // URL ของคุณ
        const gasUrl = 'https://script.google.com/macros/s/AKfycbxESHXBgm20xnXorOiDl-w3kFt6RZtU-iLUqBiJvmZKKgwyH6SraH5QrMDSj6dSuhRbpA/exec';

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'th',
                height: 'auto',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,listMonth'
                },
                buttonText: { today: 'วันนี้', month: 'เดือน', list: 'รายการ' },
                dayMaxEvents: 3,
                
                // จุดที่แก้ไข: ดึงข้อมูลจากตัวแปรที่กรองแล้ว
                events: function(fetchInfo, successCallback, failureCallback) {
                    successCallback(filterData(allEventsRaw));
                },
                
                eventContent: function(arg) {
                    return { html: `<div class="flex items-center gap-1 overflow-hidden"><span class="w-1.5 h-1.5 rounded-full shrink-0" style="background:${arg.event.backgroundColor}"></span><span class="truncate text-[9px] text-slate-600">${arg.event.title}</span></div>` };
                },
                dateClick: function(info) { showDailyEvents(info.dateStr); },
                eventClick: function(info) { 
                    info.jsEvent.preventDefault();
                    showDailyEvents(info.event.startStr.split('T')[0]); 
                }
            });
            calendar.render();
        });

        async function handleFilterChange() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
            const instruction = document.getElementById('instruction');
            
            if (checkboxes.length > 0) {
                instruction.classList.add('hidden');
                // โหลดข้อมูลจาก GAS ครั้งแรกครั้งเดียว
                if (allEventsRaw.length === 0) {
                    document.getElementById('loading').classList.remove('hidden');
                    try {
                        const response = await fetch(gasUrl);
                        allEventsRaw = await response.json();
                    } catch (e) { alert('โหลดข้อมูลไม่สำเร็จ'); }
                    document.getElementById('loading').classList.add('hidden');
                }
            } else {
                instruction.classList.remove('hidden');
            }
            // สั่งให้ปฏิทินวาดใหม่โดยใช้ฟังก์ชัน events
            calendar.refetchEvents();
        }

        function filterData(events) {
            const showDir = document.getElementById('filter-director').checked;
            const showSch = document.getElementById('filter-school').checked;
            const showVeh = document.getElementById('filter-vehicle').checked;

            return events.filter(ev => {
                if (ev.extendedProps.groupId === 'director') return showDir;
                if (ev.extendedProps.groupId === 'school') return showSch;
                if (ev.extendedProps.groupId === 'vehicle') return showVeh;
                return false;
            });
        }

        function showDailyEvents(dateStr) {
            // ดึงกิจกรรมที่กรองแล้วเท่านั้นมาแสดงใน Modal
            const currentFilteredEvents = filterData(allEventsRaw).filter(e => e.start.startsWith(dateStr));
            const container = document.getElementById('dailyEventsContainer');
            const modalDate = document.getElementById('modalDate');
            
            modalDate.innerText = new Date(dateStr).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
            container.innerHTML = '';

            if (currentFilteredEvents.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-400 py-10">ไม่มีกิจกรรม</p>';
            } else {
                currentFilteredEvents.forEach(ev => {
                    const card = document.createElement('div');
                    card.className = 'event-card';
                    card.style.borderColor = ev.backgroundColor;
                    
                    let desc = ev.extendedProps.description || 'ไม่มีรายละเอียด';
                    const urlRegex = /(https?:\/\/[^\s]+)/g;
                    desc = desc.replace(urlRegex, (url) => `<a href="${url}" target="_blank" class="block mt-2 p-2 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-bold border border-indigo-100 text-center">📎 เปิดลิงก์เอกสาร</a>`);

                    card.innerHTML = `
                        <div class="text-[10px] font-bold" style="color:${ev.backgroundColor}">${ev.extendedProps.dept}</div>
                        <div class="text-sm font-bold text-slate-800 my-1">${ev.title}</div>
                        <div class="text-xs text-slate-500 whitespace-pre-line">${desc}</div>
                    `;
                    container.appendChild(card);
                });
            }
            document.getElementById('dayModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('dayModal').style.display = 'none'; }
    </script>
</body>
</html>
