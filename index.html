<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ปฏิทินกิจกรรม - โรงเรียนพิมานพิทยาสรรค์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root {
            --bg-light: #ffffff;
            --sarabun: 'Sarabun', sans-serif;
            --slate-border: #cbd5e1;
        }
        body { 
            font-family: var(--sarabun); 
            background-color: #f8fafc; 
            color: #1e293b; 
            -webkit-font-smoothing: antialiased; 
        }

        /* ปรับสไตล์ปฏิทินให้ดูเหลี่ยมและเป็นทางการขึ้น */
        .fc { 
            background: #ffffff; 
            border-radius: 0; 
            padding: 1.5rem; 
            border: 1px solid var(--slate-border) !important; 
            box-shadow: none;
        }
        .fc-toolbar-title { font-weight: 700 !important; color: #000; }
        .fc-button { border-radius: 0 !important; text-transform: none !important; font-weight: 600 !important; }
        
        .fc-daygrid-day-number { font-weight: 700; color: #334155; }
        .fc-daygrid-day-frame { min-height: 100px !important; cursor: pointer; border: 0.5px solid #f1f5f9; }
        .fc-day-today { background: #fffbeb !important; }

        /* Badge จำนวนงาน */
        .event-count-container { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .event-count-badge {
            background: #1e293b;
            color: white; width: 35px; height: 35px; border-radius: 0; /* เปลี่ยนเป็นเหลี่ยม */
            display: flex; justify-content: center; align-items: center;
            font-size: 1.1rem; font-weight: 800;
        }

        /* ฟิลเตอร์แบบเรียบ */
        .filter-item { 
            display: flex; align-items: center; background: white; padding: 6px 14px; 
            border-radius: 0; border: 1px solid var(--slate-border); 
            font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .filter-item:has(input:checked) { background: #f1f5f9; border-color: #000; }

        /* การ์ดรายการแบบ "รวมวัน" (Official Look) */
        .date-group-card { 
            background: white; 
            border: 1px solid var(--slate-border); 
            margin-bottom: 1.5rem; 
            border-radius: 0;
        }
        .date-header {
            background: #f1f5f9;
            padding: 10px 20px;
            border-bottom: 2px solid #000;
            font-weight: 800;
            font-size: 1.2rem;
            color: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .event-item-row {
            padding: 15px 20px;
            border-bottom: 1px solid #edf2f7;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }
        .event-item-row:last-child { border-bottom: none; }
        .dept-indicator {
            width: 5px;
            align-self: stretch;
            flex-shrink: 0;
        }

        /* Modal */
        #dayModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 0; max-width: 650px; width: 95%; max-height: 90vh; overflow: hidden; border: 2px solid #000; }

        @media (max-width: 640px) {
            .date-header { font-size: 1rem; padding: 8px 15px; }
            .event-item-row { padding: 12px 15px; }
        }
        .fc-daygrid-event-harness { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="dayModal" onclick="if(event.target==this) closeModal()">
        <div class="modal-content">
            <div class="p-5 border-b bg-slate-900 text-white flex justify-between items-center">
                <h2 id="modalDate" class="font-bold text-lg"></h2>
                <button onclick="closeModal()" class="text-white text-2xl">✕</button>
            </div>
            <div id="dailyEventsContainer" class="p-6 overflow-y-auto space-y-4"></div>
            <div class="p-4 border-t text-right">
                <button onclick="closeModal()" class="px-6 py-2 bg-slate-800 text-white font-bold">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
        <header class="mb-10 border-b-2 border-slate-900 pb-6">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex items-center gap-4">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Emblem_of_Thailand.svg/100px-Emblem_of_Thailand.svg.png" class="w-16 h-16 object-contain">
                    <div>
                        <h1 class="text-2xl md:text-3xl font-black text-slate-900">ปฏิทินกิจกรรมรวม</h1>
                        <p class="text-slate-600 font-bold">โรงเรียนพิมานพิทยาสรรค์</p>
                    </div>
                </div>
                
                <div class="flex border border-slate-900 overflow-hidden">
                    <button onclick="switchView('calendar')" id="btnCal" class="px-6 py-2 font-bold text-sm bg-slate-900 text-white">แบบปฏิทิน</button>
                    <button onclick="switchView('list')" id="btnList" class="px-6 py-2 font-bold text-sm bg-white text-slate-900 border-l border-slate-900">แบบรายการ</button>
                </div>
            </div>

            <div class="flex flex-wrap gap-2 mt-6">
                <div class="filter-item text-slate-900">
                    <input type="checkbox" id="filter-all" onchange="toggleAll(this)">
                    <label for="filter-all" class="ml-2 text-sm">ทั้งหมด</label>
                </div>
                <div class="filter-item text-[#6366f1]">
                    <input type="checkbox" id="filter-director" class="dept-filter" onchange="handleFilterChange()">
                    <label for="filter-director" class="ml-2 text-sm">งานผู้อำนวยการ</label>
                </div>
                <div class="filter-item text-[#0ea5e9]">
                    <input type="checkbox" id="filter-school" class="dept-filter" onchange="handleFilterChange()">
                    <label for="filter-school" class="ml-2 text-sm">กิจกรรมโรงเรียน</label>
                </div>
                <div class="filter-item text-[#10b981]">
                    <input type="checkbox" id="filter-vehicle" class="dept-filter" onchange="handleFilterChange()">
                    <label for="filter-vehicle" class="ml-2 text-sm">งานยานพาหนะ</label>
                </div>
            </div>
        </header>

        <div id="instruction" class="text-center p-12 bg-white border border-slate-300 text-slate-400 font-bold mb-8">
            👉 กรุณาเลือกหมวดหมู่เพื่อแสดงข้อมูล
        </div>

        <div class="relative">
            <div id="loading" class="hidden absolute inset-0 bg-white/80 z-20 flex justify-center items-center">
                <div class="w-10 h-10 border-4 border-slate-200 border-t-slate-900 rounded-full animate-spin"></div>
            </div>
            
            <div id="calendarView"><div id='calendar'></div></div>
            
            <div id="listView" class="hidden">
                <div id="listContainer"></div>
            </div>
        </div>
    </div>

    <script>
        let calendar;
        let allEventsRaw = [];
        const gasUrl = 'https://script.google.com/macros/s/AKfycbxESHXBgm20xnXorOiDl-w3kFt6RZtU-iLUqBiJvmZKKgwyH6SraH5QrMDSj6dSuhRbpA/exec';

        document.addEventListener('DOMContentLoaded', function() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'th',
                height: 'auto',
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                dayCellDidMount: (info) => renderBadge(info.date, info.el),
                dateClick: (info) => showDailyEvents(info.dateStr)
            });
            calendar.render();
        });

        function switchView(mode) {
            const isCal = mode === 'calendar';
            document.getElementById('calendarView').style.display = isCal ? 'block' : 'none';
            document.getElementById('listView').style.display = isCal ? 'none' : 'block';
            
            document.getElementById('btnCal').className = isCal ? 'px-6 py-2 font-bold text-sm bg-slate-900 text-white' : 'px-6 py-2 font-bold text-sm bg-white text-slate-900 border-l border-slate-900';
            document.getElementById('btnList').className = !isCal ? 'px-6 py-2 font-bold text-sm bg-slate-900 text-white' : 'px-6 py-2 font-bold text-sm bg-white text-slate-900 border-l border-slate-900';
            
            if (!isCal) updateListView();
        }

        function toggleAll(source) {
            document.querySelectorAll('.dept-filter').forEach(f => f.checked = source.checked);
            handleFilterChange();
        }

        async function handleFilterChange() {
            const checkedFilters = document.querySelectorAll('.dept-filter:checked');
            document.getElementById('instruction').style.display = checkedFilters.length > 0 ? 'none' : 'block';
            
            if (checkedFilters.length > 0 && allEventsRaw.length === 0) {
                document.getElementById('loading').classList.remove('hidden');
                try {
                    const res = await fetch(gasUrl);
                    allEventsRaw = await res.json();
                } catch (e) { alert('โหลดข้อมูลไม่สำเร็จ'); }
                document.getElementById('loading').classList.add('hidden');
            }
            
            calendar.render(); 
            updateListView();
        }

        function filterData(events) {
            const showDir = document.getElementById('filter-director').checked;
            const showSch = document.getElementById('filter-school').checked;
            const showVeh = document.getElementById('filter-vehicle').checked;
            return events.filter(ev => {
                const gid = ev.extendedProps?.groupId;
                return (gid === 'director' && showDir) || (gid === 'school' && showSch) || (gid === 'vehicle' && showVeh);
            });
        }

        function renderBadge(date, cellEl) {
            const d = new Date(date);
            d.setHours(d.getHours() + 7);
            const dateStr = d.toISOString().split('T')[0];
            const events = filterData(allEventsRaw).filter(e => e.start.split('T')[0] === dateStr);
            
            const old = cellEl.querySelector('.event-count-container');
            if (old) old.remove();

            if (events.length > 0) {
                const container = document.createElement('div');
                container.className = 'event-count-container';
                container.innerHTML = `<div class="event-count-badge">${events.length}</div>`;
                cellEl.querySelector('.fc-daygrid-day-frame').appendChild(container);
            }
        }

        // --- ฟังก์ชันใหม่: จัดกลุ่มข้อมูลตามวันที่ ---
        function updateListView() {
            const container = document.getElementById('listContainer');
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const events = filterData(allEventsRaw).filter(e => new Date(e.start) >= today);
            
            if (events.length === 0) {
                container.innerHTML = '<div class="text-center py-20 text-slate-400 border border-dashed border-slate-300">ไม่พบกิจกรรมที่จะเกิดขึ้นในวันที่เลือก</div>';
                return;
            }

            // จัดกลุ่มตามวันที่
            const groups = {};
            events.forEach(ev => {
                const dateKey = ev.start.split('T')[0];
                if (!groups[dateKey]) groups[dateKey] = [];
                groups[dateKey].push(ev);
            });

            container.innerHTML = '';
            // แสดงผลการ์ดแยกตามวัน
            Object.keys(groups).sort().forEach(dateStr => {
                const dateEvents = groups[dateStr];
                const dateThai = new Date(dateStr).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric', weekday: 'long' });
                
                const card = document.createElement('div');
                card.className = 'date-group-card';
                
                let rowsHtml = '';
                dateEvents.forEach(ev => {
                    rowsHtml += `
                        <div class="event-item-row">
                            <div class="dept-indicator" style="background-color:${ev.backgroundColor}"></div>
                            <div class="flex-1">
                                <div class="text-[10px] font-bold uppercase mb-1" style="color:${ev.backgroundColor}">${ev.extendedProps.dept}</div>
                                <div class="text-lg font-bold text-slate-900">${ev.title}</div>
                                <div class="text-sm text-slate-500 mt-1 line-clamp-1">${ev.extendedProps.description || '-'}</div>
                                <button onclick="showDailyEvents('${dateStr}')" class="mt-2 text-xs font-bold text-slate-400 hover:text-slate-900 underline">ดูรายละเอียด</button>
                            </div>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="date-header">
                        <span>${dateThai}</span>
                        <span class="text-sm bg-slate-900 text-white px-3 py-1 font-normal">${dateEvents.length} รายการ</span>
                    </div>
                    <div class="bg-white">
                        ${rowsHtml}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function showDailyEvents(dateStr) {
            const events = filterData(allEventsRaw).filter(e => e.start.split('T')[0] === dateStr);
            const container = document.getElementById('dailyEventsContainer');
            document.getElementById('modalDate').innerText = new Date(dateStr).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
            
            container.innerHTML = '';
            events.forEach(ev => {
                const div = document.createElement('div');
                div.className = 'p-5 border border-slate-200';
                div.style.borderLeft = `6px solid ${ev.backgroundColor}`;
                
                let desc = (ev.extendedProps.description || 'ไม่มีรายละเอียด').replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="block mt-4 p-3 bg-slate-100 border border-slate-300 text-center font-bold text-sm hover:bg-slate-200">🔗 ดูเอกสารแนบ</a>');
                
                div.innerHTML = `
                    <div class="text-xs font-bold mb-1" style="color:${ev.backgroundColor}">${ev.extendedProps.dept}</div>
                    <div class="text-xl font-bold text-slate-900 mb-2">${ev.title}</div>
                    <div class="text-slate-600 text-sm leading-relaxed whitespace-pre-line border-t pt-3 mt-3">${desc}</div>
                `;
                container.appendChild(div);
            });
            document.getElementById('dayModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('dayModal').style.display = 'none'; }
    </script>
</body>
</html>
