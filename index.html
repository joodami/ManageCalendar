<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ปฏิทินกิจกรรม - โรงเรียนพิมานพิทยาสรรค์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root {
            --official-blue: #1e3a8a;
            --sarabun: 'Sarabun', sans-serif;
            --slate-border: #cbd5e1;
        }
        body { font-family: var(--sarabun); background-color: #f8fafc; color: #1e293b; -webkit-font-smoothing: antialiased; }

        /* Calendar Styling */
        .fc { background: #ffffff; border: 1px solid var(--official-blue) !important; padding: 10px; }
        .fc-toolbar-title { font-weight: 800 !important; color: var(--official-blue); font-size: 1.2rem !important; }
        .fc-button-primary { background-color: var(--official-blue) !important; border-color: var(--official-blue) !important; border-radius: 0 !important; font-weight: 700 !important; }
        .fc-daygrid-day-number { font-weight: 700; color: #334155; }
        .fc-day-today { background: #eff6ff !important; border: 2px solid var(--official-blue) !important; }

        /* Badge Number */
        .event-count-container { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .event-count-badge { background: var(--official-blue); color: white; width: 30px; height: 30px; border-radius: 0; display: flex; justify-content: center; align-items: center; font-size: 1rem; font-weight: 800; }

        /* Filter Section - บรรทัดเดียวกัน */
        .filter-container { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .filter-label { font-weight: 800; color: var(--official-blue); white-space: nowrap; font-size: 0.9rem; }
        .filter-item { display: flex; align-items: center; background: white; padding: 4px 10px; border: 1px solid var(--slate-border); font-weight: 700; cursor: pointer; font-size: 0.85rem; }
        .filter-item:has(input:checked) { border-color: var(--official-blue); background: #f0f4ff; }

        /* List View Styling */
        .date-group-card { background: white; border: 1px solid var(--slate-border); margin-bottom: 1rem; }
        .date-header { background: var(--official-blue); padding: 8px 15px; color: white; font-weight: 800; display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem; }
        .event-item-row { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; display: flex; gap: 10px; }
        .dept-indicator { width: 5px; align-self: stretch; flex-shrink: 0; }

        /* Modal Mobile Fix */
        #dayModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { background: white; max-width: 600px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; border: 3px solid var(--official-blue); }
        #dailyEventsContainer { overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }

        @media (max-width: 640px) {
            .filter-container { gap: 5px; }
            .filter-item { padding: 3px 6px; font-size: 0.75rem; }
            .fc-toolbar-title { font-size: 1rem !important; }
        }
        .fc-daygrid-event-harness { display: none !important; }

        /* สไตล์เพิ่มเติมสำหรับปุ่มลิงก์และไฟล์แนบใน Modal */
        .modal-content a {
            transition: all 0.2s ease;
            text-decoration: none;
        }
        
        .modal-content a:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }

        /* ปรับปรุงการแสดงผลข้อความใน Modal ให้รองรับการเว้นบรรทัด */
        .whitespace-pre-line {
            white-space: pre-line;
            word-break: break-word;
            line-height: 1.6;
        }

        /* ปรับแต่ง Scrollbar สำหรับ Modal บน PC ให้ดูเนียนตา */
        #dailyEventsContainer::-webkit-scrollbar {
            width: 6px;
        }
        #dailyEventsContainer::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        #dailyEventsContainer::-webkit-scrollbar-thumb {
            background: var(--official-blue);
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-3 md:p-8">

    <div id="dayModal" onclick="if(event.target==this) closeModal()">
        <div class="modal-content">
            <div class="p-4 bg-blue-900 text-white flex justify-between items-center">
                <h2 id="modalDate" class="font-bold"></h2>
                <button onclick="closeModal()" class="text-white text-2xl">&times;</button>
            </div>
            <div id="dailyEventsContainer" class="p-4 space-y-3 bg-slate-50"></div>
            <div class="p-3 border-t bg-white">
                <button onclick="closeModal()" class="w-full py-2 bg-blue-900 text-white font-bold">ปิด</button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
        <header class="mb-6 border-b-4 border-blue-900 pb-4">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <img src="https://raw.githubusercontent.com/joodami/school-assets/main/logo.png" class="w-12 h-12 object-contain">
                    <div class="text-left">
                        <h1 class="text-xl md:text-2xl font-black text-blue-900">ปฏิทินกิจกรรมโรงเรียน</h1>
                        <p class="text-slate-600 font-bold text-xs md:text-sm">โรงเรียนพิมานพิทยาสรรค์</p>
                    </div>
                </div>
                
                <div class="flex border-2 border-blue-900">
                    <button onclick="switchView('calendar')" id="btnCal" class="px-4 py-1.5 font-bold text-xs bg-blue-900 text-white">แบบปฏิทิน</button>
                    <button onclick="switchView('list')" id="btnList" class="px-4 py-1.5 font-bold text-xs bg-white text-blue-900 border-l-2 border-blue-900">แบบรายการ</button>
                </div>
            </div>

            <div class="filter-container">
                <span class="filter-label">เลือกปฏิทิน 👉</span>
                <div class="filter-item"><input type="checkbox" id="filter-all" onchange="toggleAll(this)" checked><label for="filter-all" class="ml-1 cursor-pointer">ทั้งหมด</label></div>
                <div class="filter-item text-[#6366f1]"><input type="checkbox" id="filter-director" class="dept-filter" onchange="handleFilterChange()" checked><label for="filter-director" class="ml-1 cursor-pointer">ผอ.</label></div>
                <div class="filter-item text-[#0ea5e9]"><input type="checkbox" id="filter-school" class="dept-filter" onchange="handleFilterChange()" checked><label for="filter-school" class="ml-1 cursor-pointer">กิจกรรม</label></div>
                <div class="filter-item text-[#10b981]"><input type="checkbox" id="filter-vehicle" class="dept-filter" onchange="handleFilterChange()" checked><label for="filter-vehicle" class="ml-1 cursor-pointer">ยานพาหนะ</label></div>
            </div>
        </header>

        <div class="relative">
            <div id="loading" class="hidden absolute inset-0 bg-white/80 z-20 flex justify-center items-center">
                <div class="w-10 h-10 border-4 border-slate-200 border-t-blue-900 rounded-full animate-spin"></div>
            </div>
            
            <div id="calendarView"><div id='calendar'></div></div>
            
            <div id="listView" class="hidden">
                <div id="listContainer"></div>
            </div>
        </div>
    </div>

  <script>
        let calendar;
        let allEventsRaw = [];
        const gasUrl = 'https://script.google.com/macros/s/AKfycbxESHXBgm20xnXorOiDl-w3kFt6RZtU-iLUqBiJvmZKKgwyH6SraH5QrMDSj6dSuhRbpA/exec';

        document.addEventListener('DOMContentLoaded', async function() {
            await fetchData();
            
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'th',
                height: 'auto',
                buttonText: { today: 'วันนี้' },
                headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                // ซ่อน Event แถบสีพื้นฐานเพื่อเน้นแค่ตัวเลข
                eventDisplay: 'none', 
                events: function(info, successCallback) {
                    successCallback(filterData(allEventsRaw));
                },
                // สั่งให้วาดตัวเลขทุกครั้งที่ปฏิทินขยับหรือโหลด
                datesSet: function() {
                    setTimeout(updateAllBadges, 50);
                },
                dateClick: (info) => showDailyEvents(info.dateStr)
            });
            calendar.render();
        });

        async function fetchData() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const res = await fetch(gasUrl);
                allEventsRaw = await res.json();
            } catch (e) { console.error('Load Error'); }
            document.getElementById('loading').classList.add('hidden');
        }

        // --- ฟังก์ชันหัวใจหลัก: บังคับวาดตัวเลขใหม่ทั้งหมด ---
        function updateAllBadges() {
            // 1. ล้าง Badge เก่าออกให้หมดจด
            document.querySelectorAll('.event-count-container').forEach(el => el.remove());

            // 2. ค้นหาทุกช่องวันที่ (Cell) ที่ปรากฏอยู่บนหน้าจอ
            const dayCells = document.querySelectorAll('.fc-daygrid-day');
            const filteredEvents = filterData(allEventsRaw);

            dayCells.forEach(cell => {
                const dateStr = cell.getAttribute('data-date');
                if (!dateStr) return;

                // นับจำนวนกิจกรรมในวันที่นั้นๆ
                const count = filteredEvents.filter(ev => ev.start.split('T')[0] === dateStr).length;

                if (count > 0) {
                    // สร้าง Badge ใหม่
                    const container = document.createElement('div');
                    container.className = 'event-count-container';
                    // ป้องกันการคลิก Badge แล้วไปโดนอย่างอื่น
                    container.style.pointerEvents = 'none'; 
                    container.innerHTML = `<div class="event-count-badge">${count}</div>`;
                    
                    // แทรกเข้าไปในส่วน Frame ของช่องวันที่
                    const frame = cell.querySelector('.fc-daygrid-day-frame');
                    if (frame) {
                        frame.style.position = 'relative'; // ประกันตำแหน่ง
                        frame.appendChild(container);
                    }
                }
            });
        }

        function handleFilterChange() {
            // 1. อัปเดต List View
            updateListView();
            
            // 2. ดีดตัวเลขบนปฏิทินทันที
            updateAllBadges();

            // 3. แจ้ง FullCalendar ว่าข้อมูลเปลี่ยน (เผื่อกรณีมีการใช้ Event อื่นๆ)
            if (calendar) {
                calendar.refetchEvents();
            }

            // 4. อัปเดตสถานะปุ่ม Checkbox
            updateAllCheckboxStatus();
        }

        function updateAllCheckboxStatus() {
            const allFilters = Array.from(document.querySelectorAll('.dept-filter'));
            const checkedFilters = allFilters.filter(f => f.checked);
            const filterAll = document.getElementById('filter-all');
            
            if (checkedFilters.length === allFilters.length) {
                filterAll.checked = true;
                filterAll.indeterminate = false;
            } else if (checkedFilters.length === 0) {
                filterAll.checked = false;
                filterAll.indeterminate = false;
            } else {
                filterAll.checked = false;
                filterAll.indeterminate = true; 
            }
        }

        function toggleAll(source) {
            document.querySelectorAll('.dept-filter').forEach(f => f.checked = source.checked);
            handleFilterChange();
        }

        function filterData(events) {
            const showDir = document.getElementById('filter-director').checked;
            const showSch = document.getElementById('filter-school').checked;
            const showVeh = document.getElementById('filter-vehicle').checked;
            return events.filter(ev => {
                const gid = ev.extendedProps?.groupId;
                return (gid === 'director' && showDir) || (gid === 'school' && showSch) || (gid === 'vehicle' && showVeh);
            });
        }

        function switchView(mode) {
            const isCal = mode === 'calendar';
            document.getElementById('calendarView').style.display = isCal ? 'block' : 'none';
            document.getElementById('listView').style.display = isCal ? 'none' : 'block';
            
            document.getElementById('btnCal').className = isCal ? 'px-4 py-1.5 font-bold text-xs bg-blue-900 text-white' : 'px-4 py-1.5 font-bold text-xs bg-white text-blue-900 border-l-2 border-blue-900';
            document.getElementById('btnList').className = !isCal ? 'px-4 py-1.5 font-bold text-xs bg-blue-900 text-white' : 'px-4 py-1.5 font-bold text-xs bg-white text-blue-900 border-l-2 border-blue-900';
            
            if (isCal) {
                calendar.updateSize();
                updateAllBadges();
            } else {
                updateListView();
            }
        }

       // --- แก้ไขส่วนการวาดรายการ (List View) เพื่อส่ง ID หรือดัชนีเฉพาะตัวไป ---
        function updateListView() {
            const container = document.getElementById('listContainer');
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();
            
            const events = filterData(allEventsRaw).filter(e => {
                const evDate = new Date(e.start);
                return evDate.getMonth() === currentMonth && evDate.getFullYear() === currentYear;
            });
            
            if (events.length === 0) {
                container.innerHTML = '<div class="text-center py-10 text-slate-400 font-bold border border-slate-200">ไม่มีกิจกรรมในเดือนนี้</div>';
                return;
            }

            const groups = {};
            events.forEach(ev => {
                const dateKey = ev.start.split('T')[0];
                if (!groups[dateKey]) groups[dateKey] = [];
                groups[dateKey].push(ev);
            });

            container.innerHTML = '';
            Object.keys(groups).sort().forEach(dateStr => {
                const dateEvents = groups[dateStr];
                const dateThai = new Date(dateStr).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
                const card = document.createElement('div');
                card.className = 'date-group-card';
                let rowsHtml = '';
                
                dateEvents.forEach(ev => {
                    // ใช้ชื่อ Title เป็น Key ในการค้นหาเฉพาะงาน (หรือใช้ Object Reference)
                    const eventData = JSON.stringify({title: ev.title, date: dateStr}).replace(/"/g, '&quot;');
                    rowsHtml += `
                        <div class="event-item-row">
                            <div class="dept-indicator" style="background-color:${ev.backgroundColor}"></div>
                            <div class="flex-1">
                                <div class="text-[9px] font-black uppercase" style="color:${ev.backgroundColor}">${ev.extendedProps.dept}</div>
                                <div class="text-base font-bold text-slate-900">${ev.title}</div>
                                <button onclick="showSingleEvent('${eventData}')" class="text-[11px] font-bold text-blue-700 underline">ดูรายละเอียดเฉพาะงานนี้</button>
                            </div>
                        </div>`;
                });
                card.innerHTML = `<div class="date-header"><span>${dateThai}</span><span class="text-[10px] bg-white text-blue-900 px-2 py-0.5">${dateEvents.length} งาน</span></div>${rowsHtml}`;
                container.appendChild(card);
            });
        }

      // --- เพิ่มฟังก์ชันแสดงเฉพาะกิจกรรมเดียว ---
        function showSingleEvent(jsonStr) {
            const target = JSON.parse(jsonStr);
            const ev = allEventsRaw.find(e => e.title === target.title && e.start.split('T')[0] === target.date);
            
            if (ev) {
                const container = document.getElementById('dailyEventsContainer');
                document.getElementById('modalDate').innerText = "รายละเอียดกิจกรรม";
                container.innerHTML = '';
                renderEventDetail(ev, container);
                document.getElementById('dayModal').style.display = 'flex';
            }
        }

 // --- แก้ไขฟังก์ชันเดิมให้เรียกใช้การวาดแบบเดียวกัน ---
        function showDailyEvents(dateStr) {
            const events = filterData(allEventsRaw).filter(e => e.start.split('T')[0] === dateStr);
            const container = document.getElementById('dailyEventsContainer');
            document.getElementById('modalDate').innerText = new Date(dateStr).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
            container.innerHTML = '';
            events.forEach(ev => renderEventDetail(ev, container));
            document.getElementById('dayModal').style.display = 'flex';
        }

      // --- ฟังก์ชันส่วนกลางสำหรับวาดรายละเอียดและจัดการลิงก์ไฟล์แนบ ---
        function renderEventDetail(ev, container) {
            const div = document.createElement('div');
            div.className = 'p-4 bg-white border border-slate-200 mb-3';
            div.style.borderLeft = `6px solid ${ev.backgroundColor}`;
            
            let description = ev.extendedProps.description || 'ไม่มีรายละเอียดเพิ่มเติม';
            
            // แยก Link ทั่วไป กับ Link ที่เป็นไฟล์ (Google Drive/Docs/PDF)
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            let formattedDesc = description.replace(urlRegex, (url) => {
                if (url.includes('drive.google.com') || url.includes('docs.google.com') || url.includes('.pdf')) {
                    return `<a href="${url}" target="_blank" class="block mt-3 p-3 bg-emerald-50 text-emerald-700 text-center font-bold text-sm border-2 border-emerald-200 rounded-sm">📄 เปิดไฟล์แนบ / เอกสารอ้างอิง</a>`;
                } else {
                    return `<a href="${url}" target="_blank" class="inline-block text-blue-600 underline break-all">${url}</a>`;
                }
            });

            div.innerHTML = `
                <p class="text-[10px] font-black" style="color:${ev.backgroundColor}">${ev.extendedProps.dept}</p>
                <h3 class="text-lg font-bold text-slate-900 leading-tight">${ev.title}</h3>
                <div class="text-slate-600 text-sm mt-3 border-t pt-3 whitespace-pre-line">${formattedDesc}</div>
            `;
            container.appendChild(div);
        }

        function closeModal() { document.getElementById('dayModal').style.display = 'none'; }
    </script>
</body>
</html>
