<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ปฏิทินกิจกรรม - Phiman Phitthayasan</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root {
            --bg-main: #f0f4f8;
            --text-dark: #0f172a;
            --text-muted: #475569;
        }
        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: var(--bg-main);
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- ปฏิทินหลัก --- */
        .fc { 
            background: white; 
            border-radius: 2.5rem; 
            padding: clamp(1rem, 4vw, 2.5rem); 
            border: none !important; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }
        .fc-header-toolbar { margin-bottom: 2.5rem !important; gap: 15px; }
        .fc-toolbar-title { 
            font-size: clamp(1.6rem, 6vw, 2.5rem) !important; 
            font-weight: 800 !important; 
            color: #1e1b4b;
        }

        /* --- ปุ่มควบคุม --- */
        .fc-button {
            background: #ffffff !important;
            border: 2px solid #e2e8f0 !important;
            color: #1e293b !important;
            font-weight: 700 !important;
            padding: 12px 20px !important;
            border-radius: 16px !important;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05) !important;
        }
        .fc-button-active { background: #1e1b4b !important; color: white !important; border-color: #1e1b4b !important; }

        /* --- วันที่ในปฏิทิน --- */
        .fc-daygrid-day-number { 
            font-size: 1.25rem !important; 
            padding: 15px !important; 
            font-weight: 700;
            color: #334155;
        }
        .fc-daygrid-day-frame { min-height: 110px !important; cursor: pointer; transition: 0.2s; }
        .fc-daygrid-day-frame:hover { background: #f8fafc; }
        .fc-day-today { background: #eef2ff !important; }
        .fc-day-today .fc-daygrid-day-number { color: #4f46e5; }

        /* --- ป้ายแจ้งเตือน (Badge) --- */
        .event-count-badge {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 800;
            box-shadow: 0 8px 15px -3px rgba(99, 102, 241, 0.5);
            display: inline-block;
        }

        /* --- Modal รายละเอียด --- */
        #dayModal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(2, 6, 23, 0.9); z-index: 9999; 
            align-items: center; justify-content: center; padding: 10px; 
            backdrop-filter: blur(10px); 
        }
        .modal-content { 
            background: white; border-radius: 3rem; 
            max-width: 600px; width: 100%; max-height: 90vh; 
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* --- การ์ดกิจกรรม --- */
        .event-card { 
            border-left: 10px solid; background: white; 
            padding: 24px; border-radius: 2rem; margin-bottom: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            border-top: 1px solid #f1f5f9;
            border-right: 1px solid #f1f5f9;
            border-bottom: 1px solid #f1f5f9;
        }
        .event-card-title { 
            font-size: 1.5rem; 
            font-weight: 800; color: #0f172a; line-height: 1.3;
            margin-bottom: 8px;
        }
        .event-card-dept { font-size: 0.95rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.8; }
        .event-card-desc { font-size: 1.15rem; color: #475569; line-height: 1.6; font-weight: 500; }

        /* --- ฟิลเตอร์ (Pills) --- */
        .filter-item { 
            display: flex; align-items: center; background: white; 
            padding: 14px 24px; border-radius: 20px; border: 3px solid #e2e8f0; 
            font-size: 1.1rem; font-weight: 800; 
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.04);
        }
        .filter-item:has(input:checked) { border-color: currentColor; background: #fff; transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .filter-item input { width: 24px; height: 24px; cursor: pointer; }

        /* --- สำหรับมือถือโดยเฉพาะ --- */
        @media (max-width: 640px) {
            body { padding: 10px; }
            .fc { padding: 1rem; border-radius: 1.5rem; }
            .fc-header-toolbar { flex-direction: column !important; }
            .fc-daygrid-day-frame { min-height: 85px !important; }
            .event-count-badge { font-size: 0.85rem; padding: 5px 10px; border-radius: 10px; }
            .event-card { padding: 20px; }
            .event-card-title { font-size: 1.3rem; }
            .event-card-desc { font-size: 1.1rem; }
            .modal-content { border-radius: 2rem; }
            .filter-item { padding: 10px 15px; font-size: 0.95rem; }
        }

        .fc-daygrid-event-harness { display: none !important; } 
    </style>
</head>
<body class="p-2 md:p-10 lg:p-16">

    <div id="dayModal" onclick="if(event.target==this) closeModal()">
        <div class="modal-content animate-in slide-in-from-bottom duration-500">
            <div class="p-8 border-b flex justify-between items-start bg-white sticky top-0 z-10">
                <div>
                    <h2 id="modalDate" class="text-3xl font-extrabold text-slate-900 tracking-tight"></h2>
                    <p class="text-indigo-600 font-extrabold mt-1 text-lg">🗓️ กิจกรรมวันนี้</p>
                </div>
                <button onclick="closeModal()" class="p-3 bg-slate-100 hover:bg-red-50 hover:text-red-500 rounded-2xl transition-all">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>
            </div>
            <div id="dailyEventsContainer" class="p-6 md:p-10 overflow-y-auto space-y-6 bg-slate-50">
                </div>
            <div class="p-6 bg-white border-t">
                <button onclick="closeModal()" class="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-3xl text-2xl font-black shadow-2xl transition-all active:scale-95">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex flex-col lg:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-6">
                <div class="p-4 bg-white rounded-[2rem] shadow-xl">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Emblem_of_Thailand.svg/100px-Emblem_of_Thailand.svg.png" 
                         alt="School Logo" class="w-16 h-16 md:w-24 md:h-24 object-contain">
                </div>
                <div>
                    <h1 class="text-3xl md:text-6xl font-black text-slate-900 tracking-tighter leading-none">ปฏิทินกิจกรรม</h1>
                    <p class="text-lg md:text-2xl font-bold text-indigo-500 mt-2">โรงเรียนพิมานพิทยาสรรค์</p>
                </div>
            </div>

            <div class="flex flex-wrap gap-3 justify-center">
                <div class="filter-item border-[#6366f1] text-[#6366f1]">
                    <input type="checkbox" id="filter-director" onchange="handleFilterChange()" class="accent-[#6366f1]">
                    <label for="filter-director" class="ml-3">ผอ.</label>
                </div>
                <div class="filter-item border-[#0ea5e9] text-[#0ea5e9]">
                    <input type="checkbox" id="filter-school" onchange="handleFilterChange()" class="accent-[#0ea5e9]">
                    <label for="filter-school" class="ml-3">กิจกรรม</label>
                </div>
                <div class="filter-item border-[#10b981] text-[#10b981]">
                    <input type="checkbox" id="filter-vehicle" onchange="handleFilterChange()" class="accent-[#10b981]">
                    <label for="filter-vehicle" class="ml-3">ยานพาหนะ</label>
                </div>
            </div>
        </header>

        <div id="instruction" class="text-center py-10 px-8 bg-white border-4 border-dashed border-indigo-200 rounded-[3rem] mb-10">
            <p class="text-2xl md:text-3xl font-black text-indigo-400 animate-bounce">👆 กรุณาเลือกรายการที่ต้องการดูด้านบน</p>
        </div>

        <div class="relative">
            <div id="loading" class="hidden absolute inset-0 bg-white/95 z-20 flex flex-col justify-center items-center rounded-[3rem] backdrop-blur-xl">
                <div class="w-24 h-24 border-[10px] border-slate-100 border-t-indigo-600 rounded-full animate-spin mb-6"></div>
                <p class="text-2xl font-black text-slate-800">กำลังเตรียมข้อมูล...</p>
            </div>
            <div id='calendar'></div>
        </div>
    </div>

    <script>
        let calendar;
        let allEventsRaw = [];
        const gasUrl = 'https://script.google.com/macros/s/AKfycbxESHXBgm20xnXorOiDl-w3kFt6RZtU-iLUqBiJvmZKKgwyH6SraH5QrMDSj6dSuhRbpA/exec';

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'th',
                height: 'auto',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: ''
                },
                buttonText: { today: 'วันนี้' },
                dayCellDidMount: function(info) {
                    updateDayCell(info.date, info.el);
                },
                dateClick: (info) => showDailyEvents(info.dateStr)
            });
            calendar.render();
        });

        function updateDayCell(date, cellEl) {
            const offset = date.getTimezoneOffset() * 60000;
            const localISOTime = new Date(date - offset).toISOString().split('T')[0];
            const events = filterData(allEventsRaw).filter(e => e.start.startsWith(localISOTime));
            
            const oldBadge = cellEl.querySelector('.event-count-container');
            if (oldBadge) oldBadge.remove();

            if (events.length > 0) {
                const container = document.createElement('div');
                container.className = 'event-count-container flex justify-center items-center mt-1';
                container.innerHTML = `<span class="event-count-badge">${events.length} งาน</span>`;
                cellEl.querySelector('.fc-daygrid-day-frame').appendChild(container);
            }
        }

        async function handleFilterChange() {
            const checked = document.querySelectorAll('input[type="checkbox"]:checked').length > 0;
            document.getElementById('instruction').style.display = checked ? 'none' : 'block';
            
            if (checked && allEventsRaw.length === 0) {
                document.getElementById('loading').classList.remove('hidden');
                try {
                    const res = await fetch(gasUrl);
                    allEventsRaw = await res.json();
                } catch (e) { alert('ไม่สามารถเชื่อมต่อข้อมูลได้'); }
                document.getElementById('loading').classList.add('hidden');
            }
            calendar.render(); 
        }

        function filterData(events) {
            const showDir = document.getElementById('filter-director').checked;
            const showSch = document.getElementById('filter-school').checked;
            const showVeh = document.getElementById('filter-vehicle').checked;
            return events.filter(ev => {
                if (ev.extendedProps.groupId === 'director') return showDir;
                if (ev.extendedProps.groupId === 'school') return showSch;
                if (ev.extendedProps.groupId === 'vehicle') return showVeh;
                return false;
            });
        }

        function showDailyEvents(dateStr) {
            const events = filterData(allEventsRaw).filter(e => e.start.startsWith(dateStr));
            const container = document.getElementById('dailyEventsContainer');
            document.getElementById('modalDate').innerText = new Date(dateStr).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
            container.innerHTML = '';
            
            if (events.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20">
                        <p class="text-2xl text-slate-400 font-bold">ไม่มีกิจกรรมในวันนี้</p>
                    </div>`;
            } else {
                events.forEach(ev => {
                    const card = document.createElement('div');
                    card.className = 'event-card';
                    card.style.borderColor = ev.backgroundColor;
                    
                    let desc = ev.extendedProps.description || 'ไม่มีรายละเอียดเพิ่มเติม';
                    const urlRegex = /(https?:\/\/[^\s]+)/g;
                    desc = desc.replace(urlRegex, (url) => `
                        <a href="${url}" target="_blank" class="flex items-center justify-center gap-3 mt-6 p-5 bg-indigo-600 text-white rounded-[1.5rem] text-lg font-black shadow-xl hover:scale-105 transition-all">
                            📎 เปิดดูเอกสารแนบ
                        </a>`);

                    card.innerHTML = `
                        <div class="event-card-dept" style="color:${ev.backgroundColor}">${ev.extendedProps.dept}</div>
                        <div class="event-card-title">${ev.title}</div>
                        <div class="event-card-desc whitespace-pre-line">${desc}</div>
                    `;
                    container.appendChild(card);
                });
            }
            document.getElementById('dayModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('dayModal').style.display = 'none'; }
    </script>
</body>
</html>
