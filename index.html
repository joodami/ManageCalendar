<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบปฏิทินกิจกรรมโรงเรียน</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .fc-event { padding: 3px 6px; border-radius: 6px; font-weight: 300; border: none !important; }
        .fc-toolbar-title { font-weight: 600; color: #1e293b; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">ปฏิทินกิจกรรมรวม</h1>
                <p class="text-slate-500 text-lg">Phiman Phitthayasan School</p>
            </div>
            
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-wrap gap-4 text-sm">
                <div class="flex items-center"><span class="legend-dot" style="background: #6366f1;"></span>ตารางงานผู้อำนวยการ/div>
                <div class="flex items-center"><span class="legend-dot" style="background: #10b981;"></span>งานยานพาหนะ</div>
            </div>
        </header>

        <div class="bg-white p-2 md:p-6 rounded-3xl shadow-2xl shadow-indigo-100 border border-white">
            <div id='calendar'></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const calendarEl = document.getElementById('calendar');
            
            // แทนที่ด้วย URL ของ Google Apps Script ที่คุณ Deploy แล้ว
            const gasUrl = 'https://script.google.com/macros/s/AKfycbxESHXBgm20xnXorOiDl-w3kFt6RZtU-iLUqBiJvmZKKgwyH6SraH5QrMDSj6dSuhRbpA/exec';

            // แสดงสถานะการโหลด
            calendarEl.innerHTML = '<div class="flex justify-center items-center h-64 text-indigo-500 animate-pulse">กำลังดึงข้อมูลปฏิทิน...</div>';

            try {
                const response = await fetch(gasUrl);
                const events = await response.json();

                const calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'dayGridMonth',
                    locale: 'th',
                    headerToolbar: {
                        left: 'prev,next today',
                        center: 'title',
                        right: 'dayGridMonth,timeGridWeek,listMonth'
                    },
                    buttonText: {
                        today: 'วันนี้',
                        month: 'เดือน',
                        week: 'สัปดาห์',
                        list: 'รายการ'
                    },
                    events: events,
                    eventClick: function(info) {
                        alert('กิจกรรม: ' + info.event.title + '\nฝ่ายที่รับผิดชอบ: ' + info.event.extendedProps.department);
                    }
                });
                
                calendarEl.innerHTML = ''; // ล้างสถานะการโหลด
                calendar.render();
            } catch (error) {
                calendarEl.innerHTML = '<div class="text-red-500 text-center p-10 font-bold">ไม่สามารถดึงข้อมูลได้ กรุณาตรวจสอบการตั้งค่าการแชร์ปฏิทิน</div>';
                console.error(error);
            }
        });
    </script>
</body>
</html>
